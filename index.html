<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Sổ Lưu Bút Tuổi Học Trò ✨</title>
    
    <!-- CSS Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&family=Caveat:wght@600;700&display=swap');
        
        body { font-family: 'Quicksand', sans-serif; }
        .font-serif-title { font-family: 'Playfair Display', serif; }
        .font-handwriting { font-family: 'Patrick Hand', cursive; }
        .font-cursive { font-family: 'Caveat', cursive; }

        .notebook-paper {
            background-color: #faf6eb; 
            background-image: 
                linear-gradient(90deg, transparent 59px, #f43f5e 1px, #f43f5e 1px, transparent 61px),
                linear-gradient(rgba(14, 165, 233, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 100% 24px, 24px 100%;
            background-position: 0 0, 0 16px, 12px 0;
            line-height: 24px;
        }

        /* --- HIỆU ỨNG LẬT TRANG MỚI --- */
        .flip-out-left {
            animation: flipOutLeftAnim 0.5s ease-in forwards;
            transform-origin: left center;
            transform-style: preserve-3d;
        }
        @keyframes flipOutLeftAnim {
            0% { transform: perspective(2000px) rotateY(0deg); opacity: 1; }
            100% { transform: perspective(2000px) rotateY(-180deg); opacity: 0; }
        }

        .flip-in-right {
            animation: flipInRightAnim 0.6s ease-out forwards;
            transform-origin: left center;
            transform-style: preserve-3d;
        }
        @keyframes flipInRightAnim {
            0% { transform: perspective(2000px) rotateY(-180deg); opacity: 0; }
            100% { transform: perspective(2000px) rotateY(0deg); opacity: 1; }
        }

        .fade-in {
            animation: fadeInAnim 0.3s ease-in forwards;
        }
        @keyframes fadeInAnim {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* --- CSS CHO HIỆU ỨNG ĐÓNG MỞ SÁCH --- */
        .perspective-2000 {
            perspective: 2000px;
        }
        .book-cover {
            transform-origin: left center;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.8s ease-in 0.2s;
            transform-style: preserve-3d;
            z-index: 40;
        }
        /* Mở nắp nhẹ và làm mờ bìa đi để không che Khay đồ dùng */
        .book-cover.is-open {
            transform: rotateY(-140deg); 
            opacity: 0;
            pointer-events: none;
        }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .book-spine {
            background: linear-gradient(to right, #1f120d 0%, #3b271d 20%, #4a3525 50%, #3b271d 80%, #1f120d 100%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #3b271d; }
        ::-webkit-scrollbar-thumb { background: #8b5a2b; border-radius: 4px; }
        
        .sticker-scroll::-webkit-scrollbar { width: 4px; }
        .sticker-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .sticker-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>

    <!-- React, Babel, Firebase -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#2d1b13] text-stone-800 min-h-screen relative overflow-x-hidden selection:bg-amber-200">

    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#5a3d28_1px,transparent_1px)] [background-size:16px_16px] pointer-events-none"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBsrtuab9iEdGqBOwYOD7o-Lcg3-oeGsJc",
            authDomain: "luubut-2cdca.firebaseapp.com",
            projectId: "luubut-2cdca",
            storageBucket: "luubut-2cdca.firebasestorage.app",
            messagingSenderId: "681786124008",
            appId: "1:681786124008:web:f05056b4a831e4c9204b5d"
        };

        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (error) {
            console.error("Lỗi kết nối Firebase:", error);
        }

        const COLLECTION_NAME = 'luubut_class_v5'; 

        const STICKER_TEMPLATES = {
            phuongvi: { name: "Hoa Phượng", content: "https://cdn-icons-png.flaticon.com/512/3209/3209012.png" },
            plane: { name: "Máy Bay Giấy", content: "https://cdn-icons-png.flaticon.com/512/2165/2165734.png" },
            heart: { name: "Trái Tim", content: "https://cdn-icons-png.flaticon.com/512/833/833472.png" },
            daisy: { name: "Cúc Họa Mi", content: "https://cdn-icons-png.flaticon.com/512/1087/1087340.png" },
            star: { name: "Ngôi Sao", content: "https://cdn-icons-png.flaticon.com/512/1828/1828884.png" },
            sun: { name: "Mặt Trời", content: "https://cdn-icons-png.flaticon.com/512/869/869869.png" },
            cat: { name: "Mèo Cute", content: "https://cdn-icons-png.flaticon.com/512/2950/2950993.png" },
            dog: { name: "Cún", content: "https://cdn-icons-png.flaticon.com/512/616/616408.png" },
            balloon: { name: "Bóng Bay", content: "https://cdn-icons-png.flaticon.com/512/4370/4370605.png" },
            rainbow: { name: "Cầu Vồng", content: "https://cdn-icons-png.flaticon.com/512/3063/3063162.png" },
            gift: { name: "Hộp Quà", content: "https://cdn-icons-png.flaticon.com/512/4213/4213958.png" },
            camera: { name: "Máy Ảnh", content: "https://cdn-icons-png.flaticon.com/512/3178/3178158.png" },
            gradcap: { name: "Mũ Cử Nhân", content: "https://cdn-icons-png.flaticon.com/512/2097/2097723.png" },
            backpack: { name: "Balo", content: "https://cdn-icons-png.flaticon.com/512/2436/2436737.png" },
            books: { name: "Sách Vở", content: "https://cdn-icons-png.flaticon.com/512/2232/2232688.png" },
            bicycle: { name: "Xe Đạp", content: "https://cdn-icons-png.flaticon.com/512/2972/2972185.png" },
            medal: { name: "Huy Chương", content: "https://cdn-icons-png.flaticon.com/512/3153/3153123.png" },
            music: { name: "Nốt Nhạc", content: "https://cdn-icons-png.flaticon.com/512/3295/3295074.png" },
            pencil: { name: "Bút Chì", content: "https://cdn-icons-png.flaticon.com/512/3874/3874136.png" },
            palette: { name: "Bảng Màu", content: "https://cdn-icons-png.flaticon.com/512/2916/2916120.png" }
        };

        const formatDate = (timestamp) => {
            if (!timestamp) return 'Mới đây';
            if (typeof timestamp === 'number') return new Date(timestamp).toLocaleDateString('vi-VN');
            if (timestamp.toDate) return new Date(timestamp.toDate()).toLocaleDateString('vi-VN');
            return 'Mới đây';
        };

        const generatePassword = (fullName) => {
            if (!fullName) return "";
            let str = fullName.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
            str = str.replace(/đ/g, "d").replace(/Đ/g, "D"); 
            str = str.replace(/\s+/g, "").toLowerCase(); 
            if (str.length > 0) {
                str = str.charAt(0).toUpperCase() + str.slice(1); 
            }
            return str;
        };

        function App() {
            const [pages, setPages] = useState([]);
            const [currentPageIdx, setCurrentPageIdx] = useState(0);
            const [pageFlipKey, setPageFlipKey] = useState(0); 
            const [editUnlocked, setEditUnlocked] = useState({}); 
            
            const [isBookOpen, setIsBookOpen] = useState(false);
            const [animState, setAnimState] = useState('fade-in');
            const [isAnimating, setIsAnimating] = useState(false);
            
            // Mobile toggle state cho Khay đồ dùng
            const [isMobileTrayOpen, setIsMobileTrayOpen] = useState(false);
            
            const [textInput, setTextInput] = useState('');
            const [inkColor, setInkColor] = useState('violet');
            const [fontSize, setFontSize] = useState('font-handwriting');
            
            const [selectedItemId, setSelectedItemId] = useState(null);
            const [draggingItem, setDraggingItem] = useState(null);

            const [showCreateModal, setShowCreateModal] = useState(false);
            const [showUnlockModal, setShowUnlockModal] = useState(false);
            const [showChangePassModal, setShowChangePassModal] = useState(false);
            const [newPasswordInput, setNewPasswordInput] = useState('');
            const [tempUnlockId, setTempUnlockId] = useState(null);

            const [showAdminModal, setShowAdminModal] = useState(false);
            const [adminStep, setAdminStep] = useState(1);
            const [adminPass1, setAdminPass1] = useState('');
            const [adminPass2, setAdminPass2] = useState('');
            const [isAdminUnlocked, setIsAdminUnlocked] = useState(false);

            const [showSearchModal, setShowSearchModal] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            const [unlockInput, setUnlockInput] = useState('');
            const [toast, setToast] = useState('');

            const notebookRef = useRef(null);
            const fileInputRef = useRef(null);
            const pagesLengthRef = useRef(0);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 4000);
            };

            useEffect(() => {
                if (!db) return;
                const pagesRef = db.collection(COLLECTION_NAME);
                
                const unsubscribe = pagesRef.orderBy('createdAt', 'asc').onSnapshot(snapshot => {
                    const loadedPages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    if (loadedPages.length === 0) {
                        const initData = async () => {
                            try {
                                const batch = db.batch();
                                
                                const defaultRef = pagesRef.doc();
                                batch.set(defaultRef, {
                                    author: "Tập Thể Lớp Chúng Mình",
                                    fullName: "Tập Thể Lớp Chúng Mình",
                                    password: "",
                                    items: [],
                                    createdAt: Date.now(),
                                    hasChangedPassword: true
                                });

                                const studentList = [
                                    "Khuất Phương Anh", "Nguyễn Phương Anh", "Nguyễn Thị Ngọc Anh", "Trần Phương Anh",
                                    "Trần Xuân Bắc", "Trần Thị Tâm Chuyên", "Đỗ Huyền Diệu", "Cấn Vũ Hạnh Dung",
                                    "Hoàng Ngọc Khánh Dương", "Nguyễn Thái Dương", "Trần Thị Ánh Dương", "Hoàng Thị Mai Đào",
                                    "Đinh Hương Giang", "Đỗ Bảo Hà", "Nguyễn Thị Hồng Hạnh", "Đỗ Doãn Huy Hiệp",
                                    "Vũ Trung Hiếu", "Kiều Tuấn Hùng", "Nguyễn Văn Huy", "Trần Huy Khoa",
                                    "Trương Ngọc Linh", "Nguyễn Hoàng Khánh Loan", "Nguyễn Thành Long", "Vũ Phúc Lộc",
                                    "Đỗ Hữu Minh", "Hoàng Đình Anh Minh", "Hoàng Đình Gia Minh", "Nguyễn Bá Duy Minh",
                                    "Đỗ Hà My", "Lê Đức Ngọc", "Tăng Yến Nhi", "Hoàng Bảo Như",
                                    "Nguyễn Kỳ Quốc", "Đỗ Thị Phương Thảo", "Hoàng Thị Phương Thảo", "Nguyễn Lưu Hạ Thảo",
                                    "Dương Thị Nguyệt Thu", "Đỗ Thị Thu", "Trần Thị Thanh Thuý", "Đỗ Huyền Trang",
                                    "Nguyễn Thị Thùy Trang", "Hà Hoàng Phương Trinh", "Nguyễn Thị Thu Uyên", "Trần Thị Bảo Yến"
                                ];

                                studentList.forEach((fullName, index) => {
                                    const words = fullName.trim().split(' ');
                                    let shortName = words.length >= 2 ? words.slice(-2).join(' ') : fullName;
                                    
                                    if (fullName === "Khuất Phương Anh") shortName = "Khuất Anh";
                                    else if (fullName === "Nguyễn Phương Anh") shortName = "Nguyễn Anh";
                                    else if (fullName === "Trần Phương Anh") shortName = "Trần Anh";

                                    const generatedPass = generatePassword(fullName);

                                    const docRef = pagesRef.doc();
                                    batch.set(docRef, {
                                        author: shortName,
                                        fullName: fullName,
                                        password: generatedPass,
                                        items: [],
                                        createdAt: Date.now() + index + 1,
                                        hasChangedPassword: false
                                    });
                                });

                                await batch.commit();
                            } catch (e) {
                                console.error("Lỗi khởi tạo:", e);
                            }
                        };
                        initData();
                    } else {
                        setPages(loadedPages);
                        pagesLengthRef.current = loadedPages.length; 
                        
                        if (currentPageIdx >= loadedPages.length) {
                            setCurrentPageIdx(Math.max(0, loadedPages.length - 1));
                        }
                    }
                }, error => {
                    console.error("Lỗi tải dữ liệu:", error);
                });

                return () => unsubscribe();
            }, [currentPageIdx]);

            const currentPage = pages[currentPageIdx];
            const isUnlocked = isAdminUnlocked || (currentPage && currentPage.id ? !!editUnlocked[currentPage.id] : false);

            const jumpToPage = (targetIdx) => {
                if (isAnimating || targetIdx === currentPageIdx) {
                    setShowSearchModal(false);
                    return;
                }
                setIsAnimating(true);
                const direction = targetIdx > currentPageIdx ? 'next' : 'prev';
                
                if (direction === 'next') {
                    setAnimState('flip-out-left');
                    setSelectedItemId(null);
                    setTimeout(() => {
                        setCurrentPageIdx(targetIdx);
                        setAnimState('fade-in');
                        setPageFlipKey(prev => prev + 1);
                        setTimeout(() => setIsAnimating(false), 300);
                    }, 500);
                } else {
                    setCurrentPageIdx(targetIdx);
                    setAnimState('flip-in-right');
                    setSelectedItemId(null);
                    setPageFlipKey(prev => prev + 1);
                    setTimeout(() => setIsAnimating(false), 600);
                }
                setShowSearchModal(false);
            };

            const turnPage = (direction) => {
                if (isAnimating) return; 
                
                if (direction === 'next' && currentPageIdx < pages.length - 1) {
                    jumpToPage(currentPageIdx + 1);
                } else if (direction === 'prev' && currentPageIdx > 0) {
                    jumpToPage(currentPageIdx - 1);
                }
            };

            const handleCreatePage = async (e) => {
                e.preventDefault();
                const author = e.target.author_new.value.trim();
                const pwd = e.target.password_new.value.trim();
                if (!author || !pwd) return;

                try {
                    const newDoc = await db.collection(COLLECTION_NAME).add({
                        author: author,
                        fullName: author,
                        password: pwd,
                        items: [],
                        createdAt: Date.now(),
                        hasChangedPassword: true
                    });
                    
                    setEditUnlocked(prev => ({ ...prev, [newDoc.id]: true }));
                    setShowCreateModal(false);
                    showToast(`Đã lưu trang riêng cho ${author} vĩnh viễn!`);
                    
                    setTimeout(() => {
                        jumpToPage(Math.max(0, pagesLengthRef.current - 1));
                    }, 800);

                } catch (error) {
                    showToast("Lỗi khi tạo trang. Vui lòng thử lại.");
                }
            };

            const handleUnlock = (e) => {
                e.preventDefault();
                if (!currentPage) return;
                
                if (unlockInput.trim() === currentPage.password || currentPage.password === "") {
                    if (currentPage.hasChangedPassword === false) {
                        setShowUnlockModal(false);
                        setTempUnlockId(currentPage.id);
                        setShowChangePassModal(true);
                        showToast(`Chào ${currentPage.author}, vui lòng đổi mật khẩu mới để bảo mật!`);
                    } else {
                        setEditUnlocked(prev => ({ ...prev, [currentPage.id]: true }));
                        setShowUnlockModal(false);
                        setUnlockInput('');
                        
                        // Trên thiết bị di động, tự động mở khay đồ dùng khi mở khóa thành công để họ dễ dùng
                        if(window.innerWidth < 768) {
                             setIsMobileTrayOpen(true);
                        }
                        
                        showToast(`Đã mở khóa trang của ${currentPage.author}!`);
                    }
                } else {
                    showToast("❌ Sai mật khẩu. Mật mã mặc định ban đầu là họ tên không dấu, không cách, hoa chữ cái đầu!");
                }
            };

            const handleChangePassword = async (e) => {
                e.preventDefault();
                if (!newPasswordInput.trim()) {
                    showToast("Mật khẩu không được để trống!");
                    return;
                }
                try {
                    await db.collection(COLLECTION_NAME).doc(tempUnlockId).update({
                        password: newPasswordInput.trim(),
                        hasChangedPassword: true
                    });
                    setEditUnlocked(prev => ({ ...prev, [tempUnlockId]: true }));
                    setShowChangePassModal(false);
                    setNewPasswordInput('');
                    setUnlockInput('');
                    
                    if(window.innerWidth < 768) {
                         setIsMobileTrayOpen(true);
                    }
                    
                    showToast("✅ Đổi mật khẩu thành công! Trang đã được mở khóa.");
                } catch (error) {
                    showToast("❌ Lỗi khi đổi mật khẩu.");
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminStep === 1) {
                    if (adminPass1 === "13122008") {
                        setAdminStep(2);
                        showToast("✅ Xác minh bước 1 thành công!");
                    } else {
                        showToast("❌ Sai mật khẩu bước 1!");
                    }
                } else if (adminStep === 2) {
                    if (adminPass2 === "131313") {
                        setIsAdminUnlocked(true);
                        closeAdminModal();
                        showToast("👑 Chào mừng Admin! Đã cấp quyền chỉnh sửa toàn bộ trang.");
                    } else {
                        showToast("❌ Sai mật khẩu bước 2!");
                    }
                }
            };

            const closeAdminModal = () => {
                setShowAdminModal(false);
                setAdminStep(1);
                setAdminPass1('');
                setAdminPass2('');
            };

            const addItemToPage = async (newItem) => {
                if (!isUnlocked || !currentPage) {
                    showToast("Cần mở khóa trang để dán!");
                    return;
                }
                const updatedItems = [...(currentPage.items || []), newItem];
                try {
                    await db.collection(COLLECTION_NAME).doc(currentPage.id).update({ items: updatedItems });
                } catch (error) {
                    showToast("Lỗi khi dán lên trang.");
                }
            };

            const handleAddText = (e) => {
                e.preventDefault();
                if (!textInput.trim()) return;
                addItemToPage({
                    id: 'txt_' + Date.now(), type: 'text', content: textInput,
                    color: inkColor, font: fontSize, x: 20, y: 20, scale: 1, rotate: 0
                });
                setTextInput('');
            };

            const handleAddSticker = (stickerKey) => {
                addItemToPage({
                    id: 'stk_' + Date.now(), type: 'sticker', content: STICKER_TEMPLATES[stickerKey].content,
                    x: 50, y: 50, scale: 1, rotate: (Math.random() * 30) - 15 
                });
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!isUnlocked) {
                    showToast("Vui lòng mở khóa trang trước!"); 
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400;
                        const MAX_HEIGHT = 400;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const base64Image = canvas.toDataURL('image/jpeg', 0.8);
                        
                        addItemToPage({ 
                            id: 'img_' + Date.now(), type: 'image', content: base64Image, 
                            x: 50, y: 50, scale: 1, rotate: 0 
                        });
                        showToast("Đã tải lên và dán ảnh thành công!");
                        
                        if (fileInputRef.current) fileInputRef.current.value = '';
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const deleteItem = async (itemId) => {
                if (!isUnlocked) return;
                const itemsList = currentPage.items || [];
                const updatedItems = itemsList.filter(i => i.id !== itemId);
                await db.collection(COLLECTION_NAME).doc(currentPage.id).update({ items: updatedItems });
                setSelectedItemId(null);
            };

            const updateItemTransform = async (itemId, type, direction) => {
                if (!isUnlocked) return;
                const items = [...(currentPage.items || [])];
                const index = items.findIndex(i => i.id === itemId);
                if (index === -1) return;

                if (type === 'scale') items[index].scale = Math.max(0.5, items[index].scale + (direction * 0.1));
                else if (type === 'rotate') items[index].rotate = (items[index].rotate + (direction * 15)) % 360;
                
                await db.collection(COLLECTION_NAME).doc(currentPage.id).update({ items });
            };

            const handlePointerDown = (e, item) => {
                if (!isUnlocked) return;
                e.stopPropagation();
                setSelectedItemId(item.id);

                const rect = e.target.getBoundingClientRect();
                setDraggingItem({
                    id: item.id,
                    offsetX: e.clientX - rect.left - rect.width/2,
                    offsetY: e.clientY - rect.top - rect.height/2
                });
            };

            const handlePointerMove = (e) => {
                if (!draggingItem || !isUnlocked || !notebookRef.current) return;
                
                const notebookRect = notebookRef.current.getBoundingClientRect();
                let newX = ((e.clientX - notebookRect.left - draggingItem.offsetX) / notebookRect.width) * 100;
                let newY = ((e.clientY - notebookRect.top - draggingItem.offsetY) / notebookRect.height) * 100;
                
                newX = Math.max(5, Math.min(95, newX));
                newY = Math.max(5, Math.min(95, newY));

                const itemsList = currentPage.items || [];
                const targetItem = itemsList.find(i => i.id === draggingItem.id);
                if (targetItem && targetItem.type === 'text') {
                    const yPx = (newY / 100) * notebookRect.height;
                    const snappedYPx = Math.round((yPx - 60) / 24) * 24 + 60;
                    newY = (snappedYPx / notebookRect.height) * 100;
                }

                const updatedPages = [...pages];
                const pageIdx = updatedPages.findIndex(p => p.id === currentPage.id);
                if (pageIdx !== -1 && updatedPages[pageIdx].items) {
                    const itemIdx = updatedPages[pageIdx].items.findIndex(i => i.id === draggingItem.id);
                    if (itemIdx !== -1) {
                        updatedPages[pageIdx].items[itemIdx].x = newX;
                        updatedPages[pageIdx].items[itemIdx].y = newY;
                        setPages(updatedPages);
                    }
                }
            };

            const handlePointerUp = async () => {
                if (!draggingItem || !isUnlocked) {
                    setDraggingItem(null); 
                    return;
                }
                
                const itemsList = currentPage.items || [];
                const finalItem = itemsList.find(i => i.id === draggingItem.id);
                setDraggingItem(null);
                
                if (finalItem) {
                    try {
                        await db.collection(COLLECTION_NAME).doc(currentPage.id).update({
                            items: itemsList
                        });
                    } catch(err) {
                        console.error("Lỗi cập nhật:", err);
                    }
                }
            };

            const getTextColorClass = (color) => {
                switch(color) {
                    case 'blue': return 'text-sky-800';
                    case 'red': return 'text-rose-600 font-bold';
                    case 'black': return 'text-stone-900';
                    case 'violet': default: return 'text-indigo-700';
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {/* NAV BAR */}
                    <nav className="bg-rose-950 text-rose-100 px-4 py-3 shadow-lg flex flex-col md:flex-row justify-between items-center gap-4 z-40 sticky top-0 border-b-2 border-rose-800/50">
                        <div className="flex items-center gap-3">
                            <span className="text-3xl">🎒</span>
                            <div>
                                <h1 className="text-xl font-bold font-serif-title text-amber-100 tracking-wider">KỶ NIỆM PHƯỢNG VĨ</h1>
                                <p className="text-[10px] text-rose-300 uppercase tracking-widest">Lưu bút số hóa</p>
                            </div>
                        </div>

                        {/* Pagination */}
                        <div className="flex items-center gap-4 bg-rose-900/60 px-4 py-2 rounded-full border border-rose-700/50">
                            <button onClick={() => turnPage('prev')} disabled={currentPageIdx === 0 || !currentPage || isAnimating} className="hover:text-amber-300 disabled:opacity-30 transition">
                                <i className="fa-solid fa-chevron-left fa-lg"></i>
                            </button>
                            <div className="text-sm font-semibold min-w-[120px] text-center text-amber-200">
                                {currentPage ? currentPage.author : 'Đang tải...'}
                                <span className="block text-[10px] text-rose-400 font-normal">
                                    Trang {pages.length > 0 ? currentPageIdx + 1 : 0} / {pages.length}
                                </span>
                            </div>
                            <button onClick={() => turnPage('next')} disabled={currentPageIdx === pages.length - 1 || !currentPage || isAnimating} className="hover:text-amber-300 disabled:opacity-30 transition">
                                <i className="fa-solid fa-chevron-right fa-lg"></i>
                            </button>
                        </div>

                        <div className="flex flex-wrap justify-center gap-2">
                            {/* Nút Tìm Kiếm */}
                            <button onClick={() => setShowSearchModal(true)} className="bg-stone-800/50 text-stone-300 border border-stone-600 text-xs font-bold py-2 px-3 rounded-full hover:bg-stone-700 hover:text-stone-200 transition" title="Tìm kiếm trang">
                                <i className="fa-solid fa-magnifying-glass"></i>
                            </button>
                            
                            {isAdminUnlocked ? (
                                <button onClick={() => setIsAdminUnlocked(false)} className="bg-fuchsia-600/20 text-fuchsia-400 border border-fuchsia-500/50 text-xs font-bold py-2 px-4 rounded-full flex items-center gap-2 hover:bg-fuchsia-600/40 transition" title="Tắt quyền Admin">
                                    <i className="fa-solid fa-crown"></i> Admin Mở Khóa
                                </button>
                            ) : (currentPage ? (
                                isUnlocked ? (
                                    <button onClick={() => { setEditUnlocked(prev => ({...prev, [currentPage.id]: false})); setSelectedItemId(null); }} className="bg-emerald-600/20 text-emerald-400 border border-emerald-500/50 text-xs font-bold py-2 px-4 rounded-full flex items-center gap-2 hover:bg-emerald-600/40 transition">
                                        <i className="fa-solid fa-lock-open"></i> Đang Mở Khóa
                                    </button>
                                ) : (
                                    <button onClick={() => setShowUnlockModal(true)} className="bg-stone-800/50 text-stone-300 border border-stone-600 text-xs font-bold py-2 px-4 rounded-full flex items-center gap-2 hover:bg-stone-700 transition">
                                        <i className="fa-solid fa-lock"></i> Mở Khóa Sửa
                                    </button>
                                )
                            ) : null)}
                            
                            <button onClick={() => setShowAdminModal(true)} className="bg-stone-800/50 text-stone-400 border border-stone-600 text-xs font-bold py-2 px-3 rounded-full hover:bg-stone-700 hover:text-stone-200 transition" title="Đăng nhập Quản Trị Viên">
                                <i className="fa-solid fa-user-shield"></i>
                            </button>
                            <button onClick={() => setShowCreateModal(true)} className="bg-gradient-to-r from-amber-600 to-rose-600 text-white text-xs font-bold py-2 px-4 rounded-full shadow-lg hover:scale-105 transition transform">
                                <i className="fa-solid fa-plus"></i> Tạo Trang Mới
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-12 gap-6 relative"
                          onPointerMove={handlePointerMove}
                          onPointerUp={handlePointerUp}
                          onPointerLeave={handlePointerUp}>
                        
                        {/* CỘT TRÁI: KHAY ĐỒ DÙNG - Tối ưu cho thiết bị di động */}
                        <section className="md:col-span-4 bg-stone-900/60 p-4 md:p-5 rounded-3xl md:rounded-[2rem] border border-stone-800 shadow-2xl backdrop-blur-md h-fit md:sticky md:top-24 relative z-30">
                            
                            {/* Nút Toggle mở/ẩn khay trên Mobile */}
                            <div 
                                className="flex justify-between items-center md:border-b border-stone-700 md:pb-3 md:mb-4 cursor-pointer md:cursor-default"
                                onClick={() => { if(window.innerWidth < 768) setIsMobileTrayOpen(!isMobileTrayOpen); }}
                            >
                                <h2 className="text-xl font-bold text-amber-200"><i className="fa-solid fa-palette mr-2"></i> Khay Đồ Dùng</h2>
                                <button className="md:hidden text-amber-200 bg-stone-800 border border-stone-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-md">
                                    {isMobileTrayOpen ? 'Ẩn đi' : 'Mở ra'} <i className={`fa-solid ${isMobileTrayOpen ? 'fa-chevron-up' : 'fa-chevron-down'} ml-1`}></i>
                                </button>
                            </div>
                            
                            {/* Nội dung Khay Đồ Dùng (Sẽ bị ẩn trên mobile nếu chưa bấm Mở ra) */}
                            <div className={`${isMobileTrayOpen ? 'block mt-4 border-t border-stone-700 pt-4' : 'hidden'} md:block md:mt-0 md:border-t-0 md:pt-0`}>
                                <div className={`space-y-5 ${(!isUnlocked || !isBookOpen) ? 'opacity-50 pointer-events-none' : 'transition-opacity duration-500'}`}>
                                    {/* Tool 1 */}
                                    <div className="bg-stone-800/80 p-4 rounded-2xl border border-stone-700">
                                        <label className="text-xs text-stone-400 font-bold mb-2 block">1. Viết lời chúc (Mực máy)</label>
                                        <form onSubmit={handleAddText} className="flex flex-col gap-2">
                                            <input type="text" value={textInput} onChange={e => setTextInput(e.target.value)} className="w-full bg-stone-950 border border-stone-700 rounded-xl px-3 py-2 text-sm text-stone-200 focus:ring-1 focus:ring-amber-500 outline-none" placeholder="Viết lên trang giấy..." />
                                            <div className="flex justify-between items-center mt-2">
                                                <div className="flex gap-2">
                                                    {['violet', 'blue', 'black', 'red'].map(c => (
                                                        <button key={c} type="button" onClick={() => setInkColor(c)} className={`w-5 h-5 rounded-full ${c==='violet'?'bg-indigo-500':c==='blue'?'bg-sky-500':c==='red'?'bg-rose-500':'bg-stone-800'} ${inkColor===c ? 'border-2 border-white scale-110' : 'border border-transparent'}`}></button>
                                                    ))}
                                                </div>
                                                <div className="flex gap-1 text-[10px]">
                                                    <button type="button" onClick={() => setFontSize('font-handwriting')} className={`px-2 py-1 rounded ${fontSize==='font-handwriting'?'bg-stone-700 text-white':'text-stone-400'}`}>Bút Bi</button>
                                                    <button type="button" onClick={() => setFontSize('font-cursive')} className={`px-2 py-1 rounded ${fontSize==='font-cursive'?'bg-stone-700 text-white':'text-stone-400'}`}>Lá Tre</button>
                                                </div>
                                            </div>
                                            <button type="submit" className="mt-2 bg-stone-700 hover:bg-stone-600 text-white text-xs py-2 rounded-lg font-bold">Dán Chữ Lên Vở</button>
                                        </form>
                                    </div>

                                    {/* Tool 2: Sticker */}
                                    <div className="bg-stone-800/80 p-4 rounded-2xl border border-stone-700">
                                        <label className="text-xs text-stone-400 font-bold mb-2 block">2. Dán Sticker</label>
                                        <div className="grid grid-cols-4 gap-2 max-h-36 overflow-y-auto sticker-scroll pr-1">
                                            {Object.keys(STICKER_TEMPLATES).map(key => (
                                                <button key={key} onClick={() => handleAddSticker(key)} className="bg-stone-900 hover:bg-amber-900/50 border border-stone-700 p-2 rounded-xl flex flex-col items-center justify-center gap-1 transition">
                                                    <img src={STICKER_TEMPLATES[key].content} className="w-8 h-8 object-contain drop-shadow-md opacity-90" />
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Tool 3 */}
                                    <div className="bg-stone-800/80 p-4 rounded-2xl border border-stone-700">
                                        <label className="text-xs text-stone-400 font-bold mb-2 block">3. Kẹp Ảnh Kỷ Niệm</label>
                                        <input type="file" accept="image/*" ref={fileInputRef} onChange={handleImageUpload} className="hidden" />
                                        <button onClick={() => fileInputRef.current.click()} className="w-full bg-stone-900 hover:bg-stone-700 text-amber-200 border border-stone-600 border-dashed text-xs py-4 rounded-xl flex items-center justify-center gap-2 transition">
                                            <i className="fa-solid fa-camera"></i> Chọn & Dán Ảnh Lên Sổ
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* CỘT PHẢI: CUỐN SỔ BÌA CỨNG 3D */}
                        <section className="md:col-span-8 perspective-2000 relative">
                            {isBookOpen ? (
                                <button onClick={() => setIsBookOpen(false)} className="absolute -top-4 right-8 z-50 bg-stone-800 text-amber-200 px-5 py-2 rounded-b-2xl shadow-xl hover:bg-stone-700 hover:text-amber-100 transition-all font-bold text-sm border-x border-b border-stone-600">
                                    <i className="fa-solid fa-book-journal-whills"></i> Gập sổ lại
                                </button>
                            ) : null}

                            <div className="relative w-full max-w-[650px] mx-auto h-full min-h-[500px] md:min-h-[700px] mt-2">
                                {/* BÌA SỔ (COVER) */}
                                <div 
                                    className={`book-cover absolute inset-0 w-full h-full shadow-[20px_0_30px_rgba(0,0,0,0.5)] rounded-r-3xl border-l-[16px] border-[#1a0f0a] ${isBookOpen ? 'is-open' : 'cursor-pointer hover:scale-[1.02]'}`}
                                    onClick={() => !isBookOpen && setIsBookOpen(true)}
                                >
                                    {/* Mặt trước của Bìa */}
                                    <div className="absolute inset-0 backface-hidden bg-[#4a3525] rounded-r-3xl border-4 border-[#2d1b13] flex flex-col items-center justify-center overflow-hidden">
                                        <div className="absolute inset-0 opacity-20 bg-[radial-gradient(#000_1px,transparent_1px)] [background-size:10px_10px]"></div>
                                        <div className="w-[85%] h-[90%] border-[3px] border-amber-500/40 rounded-2xl p-6 flex flex-col items-center justify-center relative bg-[#3d2b1f] shadow-inner">
                                            <div className="absolute top-4 left-4 right-4 bottom-4 border border-amber-500/20 rounded-xl pointer-events-none"></div>
                                            
                                            <div className="bg-amber-100/10 p-5 rounded-full mb-6 shadow-lg border border-amber-500/30">
                                                <i className="fa-solid fa-graduation-cap text-5xl md:text-7xl text-amber-400 drop-shadow-lg"></i>
                                            </div>
                                            
                                            <h1 className="text-4xl md:text-5xl text-center font-bold font-serif-title text-amber-100 tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)] leading-tight">
                                                KỶ NIỆM<br/>PHƯỢNG VĨ
                                            </h1>
                                            
                                            <div className="mt-8 md:mt-12 bg-amber-900/60 px-6 py-2 rounded-full border border-amber-700/50">
                                                <p className="text-amber-200 font-handwriting text-xl md:text-2xl animate-pulse flex items-center gap-2">
                                                    Nhấn để mở sổ <i className="fa-solid fa-hand-pointer"></i>
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Mặt sau của Bìa */}
                                    <div className="absolute inset-0 backface-hidden rotate-y-180 bg-[#faf6eb] rounded-l-3xl shadow-inner border-r-[16px] border-[#2d1b13] flex items-center justify-center overflow-hidden">
                                        <div className="absolute inset-0 opacity-10 bg-[radial-gradient(#5a3d28_1px,transparent_1px)] [background-size:16px_16px]"></div>
                                        <div className="text-center rotate-[-10deg] opacity-60">
                                            <i className="fa-solid fa-camera-retro text-6xl text-stone-300 mb-4"></i>
                                            <p className="font-handwriting text-4xl text-stone-400">Nơi lưu giữ<br/>thanh xuân...</p>
                                        </div>
                                    </div>
                                </div>

                                {/* PHẦN TRANG GIẤY BÊN TRONG (RIGHT PAGE) */}
                                <div className={`absolute inset-0 bg-[#4a3525] p-2 md:p-4 rounded-r-3xl shadow-2xl border-l-[16px] border-[#2d1b13] transition-opacity duration-[1.2s] ${isBookOpen ? 'opacity-100 z-10' : 'opacity-0 pointer-events-none'}`}>
                                    <div className="absolute left-0 top-0 bottom-0 w-10 book-spine z-20 border-r border-black/40"></div>
                                    <div className="w-full h-full relative pl-8">
                                        <div 
                                            key={pageFlipKey} 
                                            ref={notebookRef}
                                            className={`notebook-paper w-full h-full min-h-[500px] md:min-h-[660px] rounded-r-2xl shadow-inner relative overflow-hidden ${animState}`}
                                        >
                                            {!currentPage ? (
                                                <div className="absolute inset-0 flex flex-col items-center justify-center opacity-70 px-4 text-center">
                                                    <i className="fa-solid fa-hourglass-half fa-spin text-5xl mb-4 text-amber-800"></i>
                                                    <p className="font-handwriting text-3xl text-stone-700 mb-2">Đang tải trang...</p>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="absolute top-4 left-12 right-6 border-b border-dashed border-stone-400 pb-2">
                                                        <span className="text-xs text-stone-500 font-bold uppercase">Người viết: </span>
                                                        <span className="text-lg md:text-xl font-bold font-serif-title text-amber-900 ml-2">{currentPage.author}</span>
                                                        <span className="float-right text-[10px] text-stone-400 mt-2">
                                                            {formatDate(currentPage.createdAt)}
                                                        </span>
                                                    </div>

                                                    {(currentPage.items || []).map((item) => {
                                                        const isSelected = selectedItemId && selectedItemId === item.id;
                                                        return (
                                                            <div 
                                                                key={item.id}
                                                                onPointerDown={(e) => handlePointerDown(e, item)}
                                                                className={`absolute ${isUnlocked ? 'cursor-grab' : 'cursor-default'} ${draggingItem && draggingItem.id === item.id ? 'opacity-80' : ''} touch-none select-none`}
                                                                style={{
                                                                    left: `${item.x || 50}%`, top: `${item.y || 50}%`,
                                                                    transform: `translate(-50%, -50%)`,
                                                                    zIndex: isSelected ? 30 : 10
                                                                }}
                                                            >
                                                                <div 
                                                                    className={`relative transition-transform duration-100 ${isSelected && isUnlocked ? 'ring-2 ring-dashed ring-amber-500 bg-white/40 p-2 rounded-lg' : ''}`}
                                                                    style={{ transform: `scale(${item.scale || 1}) rotate(${item.rotate || 0}deg)` }}
                                                                >
                                                                    {isSelected && isUnlocked ? (
                                                                        <>
                                                                            {/* NÚT HOÀN THÀNH */}
                                                                            <button 
                                                                                onPointerDown={(e) => { e.stopPropagation(); setSelectedItemId(null); }} 
                                                                                className="absolute -top-12 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-emerald-500 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-emerald-600 hover:scale-105 pointer-events-auto transition z-50 font-bold text-xs gap-2 whitespace-nowrap"
                                                                            >
                                                                                <i className="fa-solid fa-check"></i> Đặt ở đây
                                                                            </button>

                                                                            {/* THÙNG RÁC XÓA */}
                                                                            <button 
                                                                                onPointerDown={(e) => { e.stopPropagation(); deleteItem(item.id); }} 
                                                                                className="absolute -bottom-4 -right-4 w-8 h-8 bg-rose-500 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-rose-600 hover:scale-110 pointer-events-auto transition z-40"
                                                                            >
                                                                                <i className="fa-solid fa-trash-can text-sm"></i>
                                                                            </button>
                                                                            
                                                                            {/* PHÓNG TO */}
                                                                            <button 
                                                                                onPointerDown={(e) => { e.stopPropagation(); updateItemTransform(item.id, 'scale', 1); }} 
                                                                                className="absolute -top-3 -right-3 w-7 h-7 bg-emerald-500 text-white rounded-full shadow-md flex items-center justify-center hover:bg-emerald-600 hover:scale-110 pointer-events-auto transition z-40"
                                                                            >
                                                                                <i className="fa-solid fa-plus text-xs"></i>
                                                                            </button>
                                                                            
                                                                            {/* THU NHỎ */}
                                                                            <button 
                                                                                onPointerDown={(e) => { e.stopPropagation(); updateItemTransform(item.id, 'scale', -1); }} 
                                                                                className="absolute -top-3 -left-3 w-7 h-7 bg-stone-500 text-white rounded-full shadow-md flex items-center justify-center hover:bg-stone-600 hover:scale-110 pointer-events-auto transition z-40"
                                                                            >
                                                                                <i className="fa-solid fa-minus text-xs"></i>
                                                                            </button>
                                                                            
                                                                            {/* XOAY VÒNG */}
                                                                            <button 
                                                                                onPointerDown={(e) => { e.stopPropagation(); updateItemTransform(item.id, 'rotate', 1); }} 
                                                                                className="absolute -bottom-3 -left-3 w-7 h-7 bg-sky-500 text-white rounded-full shadow-md flex items-center justify-center hover:bg-sky-600 hover:scale-110 pointer-events-auto transition z-40"
                                                                            >
                                                                                <i className="fa-solid fa-rotate-right text-xs"></i>
                                                                            </button>
                                                                        </>
                                                                    ) : null}

                                                                    {/* NỘI DUNG CHÍNH */}
                                                                    <div className="pointer-events-none">
                                                                        {item.type === 'text' ? <div className={`whitespace-nowrap text-xl font-semibold ${getTextColorClass(item.color)} ${item.font}`}>{item.content}</div> : null}
                                                                        {item.type === 'sticker' ? <img src={item.content} className="w-16 h-16 object-contain drop-shadow-sm" draggable="false" /> : null}
                                                                        {item.type === 'image' ? <div className="p-2 bg-white shadow-md border border-stone-200 rotate-1 max-w-[200px]"><img src={item.content} className="w-full h-auto" draggable="false" /></div> : null}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                    
                                                    {(currentPage.items || []).length === 0 ? (
                                                        <div className="absolute inset-0 flex flex-col items-center justify-center opacity-30 pointer-events-none">
                                                            <i className="fa-solid fa-pen-nib text-5xl mb-4 text-stone-500"></i>
                                                            <p className="font-handwriting text-2xl text-stone-600">Trang giấy trắng tinh...</p>
                                                        </div>
                                                    ) : null}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {toast ? (
                        <div className="fixed bottom-5 right-5 bg-stone-900 text-amber-200 px-5 py-3 rounded-xl shadow-2xl border border-amber-500/50 z-[120] flex items-center gap-3 animate-bounce">
                            <i className="fa-solid fa-bell text-amber-500"></i>
                            <span className="text-sm font-bold">{toast}</span>
                        </div>
                    ) : null}

                    {/* MODAL: TÌM KIẾM TRANG SỔ (Z-index cao nhất) */}
                    {showSearchModal ? (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex justify-center items-start pt-20 p-4">
                            <div className="bg-stone-900 border border-stone-700 p-6 rounded-3xl w-full max-w-md shadow-2xl">
                                <div className="flex justify-between items-center border-b border-stone-800 pb-3 mb-4">
                                    <h3 className="text-lg font-bold text-amber-100 flex items-center gap-2">
                                        <i className="fa-solid fa-magnifying-glass"></i> Tìm Kiếm Sổ
                                    </h3>
                                    <button onClick={() => setShowSearchModal(false)} className="text-stone-400 hover:text-rose-400 transition">
                                        <i className="fa-solid fa-times text-xl"></i>
                                    </button>
                                </div>
                                <input 
                                    type="text" 
                                    autoFocus
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                    placeholder="Nhập tên hiển thị hoặc họ tên đầy đủ..." 
                                    className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-3 text-stone-200 outline-none focus:ring-1 focus:ring-amber-500 mb-4"
                                />
                                <div className="max-h-64 overflow-y-auto sticker-scroll pr-2 space-y-2">
                                    {pages.map((p, idx) => {
                                        const matchAuthor = p.author && typeof p.author === 'string' && p.author.toLowerCase().includes(searchQuery.toLowerCase());
                                        const matchFull = p.fullName && typeof p.fullName === 'string' && p.fullName.toLowerCase().includes(searchQuery.toLowerCase());
                                        
                                        if (!matchAuthor && !matchFull) return null;
                                        
                                        return (
                                            <button 
                                                key={p.id || idx}
                                                onClick={() => jumpToPage(idx)}
                                                className="w-full text-left px-4 py-3 bg-stone-800 hover:bg-amber-900/50 border border-stone-700 hover:border-amber-700/50 rounded-xl transition flex justify-between items-center"
                                            >
                                                <div>
                                                    <div className="text-amber-100 font-bold">{p.author}</div>
                                                    {p.fullName && p.fullName !== p.author ? (
                                                        <div className="text-[10px] text-stone-400">{p.fullName}</div>
                                                    ) : null}
                                                </div>
                                                <span className="text-xs text-amber-500/70 font-semibold bg-amber-900/30 px-2 py-1 rounded">Trang {idx + 1}</span>
                                            </button>
                                        );
                                    })}
                                    {pages.filter(p => {
                                        const matchAuthor = p.author && typeof p.author === 'string' && p.author.toLowerCase().includes(searchQuery.toLowerCase());
                                        const matchFull = p.fullName && typeof p.fullName === 'string' && p.fullName.toLowerCase().includes(searchQuery.toLowerCase());
                                        return matchAuthor || matchFull;
                                    }).length === 0 ? (
                                        <div className="text-center text-stone-500 py-4 text-sm">Không tìm thấy bạn nào phù hợp.</div>
                                    ) : null}
                                </div>
                            </div>
                        </div>
                    ) : null}

                    {/* MODAL 1: TẠO TRANG */}
                    {showCreateModal ? (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex justify-center items-center p-4">
                            <form autoComplete="off" onSubmit={handleCreatePage} className="bg-stone-900 border border-stone-700 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                                <h3 className="text-lg font-bold text-amber-100 border-b border-stone-800 pb-3 mb-4">📖 Tạo Trang Sách Của Bạn</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs text-stone-400 mb-1">Tên hiển thị của bạn:</label>
                                        <input name="author_new" required type="text" className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-2 text-stone-200 outline-none focus:ring-1 focus:ring-amber-500" placeholder="VD: Huy Nè" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-stone-400 mb-1">Mật khẩu khóa trang này:</label>
                                        <input name="password_new" autoComplete="new-password" required type="password" className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-2 text-stone-200 outline-none focus:ring-1 focus:ring-amber-500 font-mono" placeholder="VD: Huyne" />
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setShowCreateModal(false)} className="flex-1 bg-stone-800 text-white py-2 rounded-xl text-sm font-bold">Hủy</button>
                                        <button type="submit" className="flex-1 bg-amber-600 text-stone-950 py-2 rounded-xl text-sm font-bold">Thêm Trang Sổ</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    ) : null}

                    {/* MODAL 2: MỞ KHÓA TRANG */}
                    {showUnlockModal ? (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex justify-center items-center p-4">
                            <form autoComplete="off" onSubmit={handleUnlock} className="bg-stone-900 border border-stone-700 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                                <h3 className="text-lg font-bold text-amber-100 border-b border-stone-800 pb-3 mb-4">🔑 Mở Khóa Chỉnh Sửa</h3>
                                <p className="text-xs text-stone-400 mb-4">Nhập mật mã (họ tên không dấu, không cách, viết hoa chữ cái đầu) để chỉnh sửa trang của <span className="font-bold text-amber-400">{currentPage?.author}</span>:</p>
                                <input 
                                    name="unlock_password_field" 
                                    autoComplete="new-password" 
                                    value={unlockInput} 
                                    onChange={e => setUnlockInput(e.target.value)} 
                                    type="password" 
                                    className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-3 text-stone-200 outline-none focus:ring-1 focus:ring-amber-500 font-mono text-center tracking-widest text-lg mb-4" 
                                    placeholder="Ví dụ: Tranvana" 
                                />
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setShowUnlockModal(false)} className="flex-1 bg-stone-800 text-white py-2 rounded-xl text-sm font-bold">Đóng</button>
                                    <button type="submit" className="flex-1 bg-emerald-600 text-white py-2 rounded-xl text-sm font-bold">Mở Khóa Nào!</button>
                                </div>
                            </form>
                        </div>
                    ) : null}

                    {/* MODAL 3: ĐỔI MẬT KHẨU LẦN ĐẦU */}
                    {showChangePassModal ? (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex justify-center items-center p-4">
                            <form autoComplete="off" onSubmit={handleChangePassword} className="bg-stone-900 border border-stone-700 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                                <h3 className="text-lg font-bold text-amber-100 border-b border-stone-800 pb-3 mb-4">🔐 Đổi Mật Khẩu Lần Đầu</h3>
                                <p className="text-xs text-stone-400 mb-4">Vì lý do bảo mật, vui lòng tạo mật khẩu mới riêng cho bạn để bảo vệ trang lưu bút này:</p>
                                <input 
                                    name="new_password_field" 
                                    autoComplete="new-password" 
                                    value={newPasswordInput} 
                                    onChange={e => setNewPasswordInput(e.target.value)} 
                                    type="password" 
                                    className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-3 text-stone-200 outline-none focus:ring-1 focus:ring-amber-500 font-mono text-center tracking-widest text-lg mb-4" 
                                    placeholder="Nhập mật khẩu mới..." 
                                />
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => { setShowChangePassModal(false); setUnlockInput(''); }} className="flex-1 bg-stone-800 text-white py-2 rounded-xl text-sm font-bold">Để Sau</button>
                                    <button type="submit" className="flex-1 bg-amber-600 text-stone-950 py-2 rounded-xl text-sm font-bold">Lưu Mật Khẩu</button>
                                </div>
                            </form>
                        </div>
                    ) : null}

                    {/* MODAL 4: ADMIN QUẢN TRỊ VIÊN */}
                    {showAdminModal ? (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-[100] flex justify-center items-center p-4">
                            <form autoComplete="off" onSubmit={handleAdminLogin} className="bg-stone-900 border border-fuchsia-800/50 p-6 rounded-3xl w-full max-w-sm shadow-[0_0_40px_rgba(162,28,175,0.3)]">
                                <h3 className="text-lg font-bold text-fuchsia-400 border-b border-stone-800 pb-3 mb-4 flex items-center gap-2">
                                    <i className="fa-solid fa-crown"></i> Quyền Quản Trị Viên
                                </h3>
                                
                                {adminStep === 1 ? (
                                    <>
                                        <p className="text-xs text-stone-400 mb-4">Xác minh bảo mật 2 lớp. <br/> <strong className="text-stone-300">Bước 1:</strong> Nhập mã bảo vệ.</p>
                                        <input 
                                            value={adminPass1} 
                                            onChange={e => setAdminPass1(e.target.value)} 
                                            type="password" 
                                            className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-3 text-stone-200 outline-none focus:ring-1 focus:ring-fuchsia-500 font-mono text-center tracking-widest text-lg mb-4" 
                                            placeholder="••••••••" 
                                        />
                                    </>
                                ) : (
                                    <>
                                        <p className="text-xs text-stone-400 mb-4">Xác minh bảo mật 2 lớp. <br/> <strong className="text-stone-300">Bước 2:</strong> Nhập mã bí mật.</p>
                                        <input 
                                            value={adminPass2} 
                                            onChange={e => setAdminPass2(e.target.value)} 
                                            type="password" 
                                            className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-3 text-stone-200 outline-none focus:ring-1 focus:ring-fuchsia-500 font-mono text-center tracking-widest text-lg mb-4" 
                                            placeholder="••••••" 
                                        />
                                    </>
                                )}
                                
                                <div className="flex gap-2">
                                    <button type="button" onClick={closeAdminModal} className="flex-1 bg-stone-800 text-white py-2 rounded-xl text-sm font-bold">Hủy Bỏ</button>
                                    <button type="submit" className="flex-1 bg-fuchsia-600 text-white py-2 rounded-xl text-sm font-bold">
                                        {adminStep === 1 ? "Tiếp Tục" : "Xác Nhận"}
                                    </button>
                                </div>
                            </form>
                        </div>
                    ) : null}
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
