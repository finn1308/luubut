<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Sổ Lưu Bút Tuổi Học Trò ✨</title>
    
    <!-- Tailwind CSS để dựng giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Thư viện Icon FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Các font chữ viết tay hoài niệm -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&family=Caveat:wght@600;700&display=swap');
        
        body { font-family: 'Quicksand', sans-serif; }
        .font-serif-title { font-family: 'Playfair Display', serif; }
        .font-handwriting { font-family: 'Patrick Hand', cursive; }
        .font-cursive { font-family: 'Caveat', cursive; }

        /* Giao diện Vở Ô Ly 3D */
        .notebook-paper {
            background-color: #faf6eb; 
            background-image: 
                linear-gradient(90deg, transparent 59px, #f43f5e 1px, #f43f5e 1px, transparent 61px),
                linear-gradient(rgba(14, 165, 233, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 100% 24px, 24px 100%;
            background-position: 0 0, 0 16px, 12px 0;
            line-height: 24px;
        }

        /* Hiệu ứng lật trang 3D */
        .page-turn-enter {
            animation: turnPageIn 0.6s cubic-bezier(0.645, 0.045, 0.355, 1) forwards;
            transform-origin: left center;
        }
        @keyframes turnPageIn {
            0% { transform: perspective(1200px) rotateY(90deg); opacity: 0; }
            100% { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
        }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #3b271d; }
        ::-webkit-scrollbar-thumb { background: #8b5a2b; border-radius: 4px; }
    </style>

    <!-- Thư viện React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK Compat (Nạp trực tiếp qua CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#2d1b13] text-stone-800 min-h-screen relative overflow-x-hidden selection:bg-amber-200">

    <!-- Lớp phủ nền mặt bàn gỗ -->
    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#5a3d28_1px,transparent_1px)] [background-size:16px_16px] pointer-events-none"></div>

    <div id="root"></div>

    <!-- CODE CHÍNH ỨNG DỤNG -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. CẤU HÌNH FIREBASE CỦA RIÊNG BẠN
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBsrtuab9iEdGqBOwYOD7o-Lcg3-oeGsJc",
            authDomain: "luubut-2cdca.firebaseapp.com",
            projectId: "luubut-2cdca",
            storageBucket: "luubut-2cdca.firebasestorage.app",
            messagingSenderId: "681786124008",
            appId: "1:681786124008:web:f05056b4a831e4c9204b5d"
        };

        // Khởi tạo Firebase
        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            console.log("✅ Đã kết nối Firebase thành công!");
        } catch (error) {
            console.error("❌ Lỗi kết nối Firebase:", error);
        }

        // ==========================================
        // 2. DỮ LIỆU GỐC & CÔNG CỤ TẠO STICKER
        // ==========================================
        const STICKER_TEMPLATES = {
            phuongvi: { name: "Hoa Phượng", icon: "🌸", content: "https://cdn-icons-png.flaticon.com/512/3209/3209012.png" },
            plane: { name: "Máy Bay Giấy", icon: "✈️", content: "https://cdn-icons-png.flaticon.com/512/2165/2165734.png" },
            heart: { name: "Trái Tim", icon: "💖", content: "https://cdn-icons-png.flaticon.com/512/833/833472.png" },
            daisy: { name: "Cúc Họa Mi", icon: "🌼", content: "https://cdn-icons-png.flaticon.com/512/1087/1087340.png" }
        };

        // Hàm hỗ trợ format hiển thị thời gian
        const formatDate = (timestamp) => {
            if (!timestamp) return 'Mới đây';
            if (typeof timestamp === 'number') return new Date(timestamp).toLocaleDateString('vi-VN');
            if (timestamp.toDate) return new Date(timestamp.toDate()).toLocaleDateString('vi-VN');
            return 'Mới đây';
        };

        function App() {
            // State dữ liệu trang
            const [pages, setPages] = useState([]);
            const [currentPageIdx, setCurrentPageIdx] = useState(0);
            const [pageFlipKey, setPageFlipKey] = useState(0); // Trigger animation lật trang
            
            // State bảo mật
            const [editUnlocked, setEditUnlocked] = useState({}); // { pageId: boolean }
            
            // State công cụ (Toolbox)
            const [textInput, setTextInput] = useState('');
            const [inkColor, setInkColor] = useState('violet');
            const [fontSize, setFontSize] = useState('font-handwriting');
            
            // State thao tác kéo thả, chọn phần tử
            const [selectedItemId, setSelectedItemId] = useState(null);
            const [draggingItem, setDraggingItem] = useState(null);

            // Modals
            const [showCreateModal, setShowCreateModal] = useState(false);
            const [showUnlockModal, setShowUnlockModal] = useState(false);
            const [unlockInput, setUnlockInput] = useState('');
            const [toast, setToast] = useState('');

            const notebookRef = useRef(null);
            const fileInputRef = useRef(null);

            // Hàm hiện thông báo góc màn hình
            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 4000);
            };

            // ==========================================
            // LẮNG NGHE DỮ LIỆU REALTIME TỪ FIREBASE
            // ==========================================
            useEffect(() => {
                if (!db) return;
                
                // Trỏ thẳng vào collection "pages" ở root (tạo mới nếu chưa có)
                const pagesRef = db.collection('pages');
                
                const unsubscribe = pagesRef.orderBy('createdAt', 'asc').onSnapshot(snapshot => {
                    const loadedPages = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    if (loadedPages.length === 0) {
                        // Nếu DB trống, tự động tạo trang bìa đầu tiên (Không pass)
                        pagesRef.add({
                            author: "Tập Thể Lớp Chúng Mình",
                            password: "",
                            items: [],
                            createdAt: Date.now() // Sử dụng Date.now() thay cho serverTimestamp để ko bị lỗi tải lại
                        }).catch(err => {
                            console.error("Lỗi tạo trang bìa:", err);
                        });
                    } else {
                        setPages(loadedPages);
                        // Đảm bảo không bị lỗi index khi có người xóa trang
                        if (currentPageIdx >= loadedPages.length) {
                            setCurrentPageIdx(Math.max(0, loadedPages.length - 1));
                        }
                    }
                }, error => {
                    console.error("Lỗi tải dữ liệu:", error);
                    if (error.message.includes("Missing or insufficient permissions")) {
                        alert("⚠️ LỖI QUYỀN TRUY CẬP (FIREBASE RULES) ⚠️\n\nBạn chưa cấp quyền Đọc/Ghi trên Firebase. Dữ liệu sẽ không được lưu!\n\nHướng dẫn sửa:\n1. Vào Firebase Console -> Firestore Database\n2. Chọn tab 'Rules' (Quy tắc)\n3. Đổi chữ 'false' thành 'true' (allow read, write: if true;)\n4. Bấm Publish và F5 lại trang này.");
                    } else {
                        showToast("Mất kết nối mạng! Vui lòng thử lại.");
                    }
                });

                return () => unsubscribe();
            }, [currentPageIdx]);

            const currentPage = pages[currentPageIdx];
            const isUnlocked = currentPage ? editUnlocked[currentPage.id] : false;

            // ==========================================
            // XỬ LÝ CHUYỂN TRANG 3D
            // ==========================================
            const turnPage = (direction) => {
                if (direction === 'next' && currentPageIdx < pages.length - 1) {
                    setCurrentPageIdx(prev => prev + 1);
                    setPageFlipKey(prev => prev + 1);
                    setSelectedItemId(null);
                } else if (direction === 'prev' && currentPageIdx > 0) {
                    setCurrentPageIdx(prev => prev - 1);
                    setPageFlipKey(prev => prev + 1);
                    setSelectedItemId(null);
                }
            };

            // ==========================================
            // TẠO TRANG & BẢO MẬT
            // ==========================================
            const handleCreatePage = async (e) => {
                e.preventDefault();
                const author = e.target.author.value.trim();
                const pwd = e.target.password.value.trim();
                if (!author || !pwd) return;

                try {
                    const newDoc = await db.collection('pages').add({
                        author: author,
                        password: pwd,
                        items: [],
                        createdAt: Date.now()
                    });
                    
                    setEditUnlocked(prev => ({ ...prev, [newDoc.id]: true }));
                    setShowCreateModal(false);
                    showToast(`Đã lưu trang riêng cho ${author} vĩnh viễn!`);
                    
                    // Chuyển đến trang cuối (trang vừa tạo)
                    setTimeout(() => {
                        setCurrentPageIdx(pages.length);
                        setPageFlipKey(prev => prev + 1);
                    }, 500);

                } catch (error) {
                    console.error("Lỗi khi tạo trang:", error);
                    if (error.message.includes("permission")) {
                        alert("❌ KHÔNG THỂ LƯU! Bạn chưa bật quyền Ghi (Rules) trong Firebase.\nHãy sửa Rules thành 'true' rồi thử lại nhé!");
                    } else {
                        showToast("Lỗi khi tạo trang. Vui lòng thử lại.");
                    }
                }
            };

            const handleUnlock = (e) => {
                e.preventDefault();
                if (!currentPage) return;
                
                // Mật khẩu đúng hoặc trang không có mật khẩu (trang bìa)
                if (unlockInput === currentPage.password || currentPage.password === "") {
                    setEditUnlocked(prev => ({ ...prev, [currentPage.id]: true }));
                    setShowUnlockModal(false);
                    setUnlockInput('');
                    showToast("Mở khóa thành công! Bạn có thể viết vẽ rồi.");
                } else {
                    showToast("❌ Sai mật khẩu. Vui lòng hỏi chủ trang!");
                }
            };

            // ==========================================
            // THÊM ITEM VÀO TRANG (Chữ, Ảnh, Sticker)
            // ==========================================
            const addItemToPage = async (newItem) => {
                if (!isUnlocked || !currentPage) {
                    showToast("Cần mở khóa trang để dán!");
                    return;
                }
                const updatedItems = [...(currentPage.items || []), newItem];
                try {
                    await db.collection('pages').doc(currentPage.id).update({ items: updatedItems });
                } catch (error) {
                    console.error("Lỗi lưu item:", error);
                    if (error.message.includes("permission")) {
                        alert("❌ KHÔNG THỂ LƯU! Bạn chưa bật quyền Ghi (Rules) trong Firebase.");
                    } else {
                        showToast("Lỗi khi dán lên trang.");
                    }
                }
            };

            const handleAddText = (e) => {
                e.preventDefault();
                if (!textInput.trim()) return;
                addItemToPage({
                    id: 'txt_' + Date.now(),
                    type: 'text',
                    content: textInput,
                    color: inkColor,
                    font: fontSize,
                    x: 20, // Tọa độ X % mặc định
                    y: 20, // Tọa độ Y % mặc định
                    scale: 1,
                    rotate: 0
                });
                setTextInput('');
            };

            const handleAddSticker = (stickerKey) => {
                addItemToPage({
                    id: 'stk_' + Date.now(),
                    type: 'sticker',
                    content: STICKER_TEMPLATES[stickerKey].content,
                    x: 50, y: 50,
                    scale: 1, rotate: (Math.random() * 30) - 15 // Ngẫu nhiên xoay nhẹ
                });
            };

            // Xử lý nén ảnh ra Base64 để lưu thẳng vào Firestore (Giới hạn 1MB/Document)
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!isUnlocked) {
                    showToast("Vui lòng mở khóa trang trước khi tải ảnh lên!");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        // Vẽ ra Canvas để thu nhỏ kích thước (chống tràn dung lượng Firestore)
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // Xuất ra Base64 chất lượng 70%
                        const base64Image = canvas.toDataURL('image/jpeg', 0.7);
                        
                        addItemToPage({
                            id: 'img_' + Date.now(),
                            type: 'image',
                            content: base64Image,
                            x: 50, y: 50,
                            scale: 1, rotate: 0
                        });
                        showToast("Đã dán ảnh thành công!");
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // ==========================================
            // KÉO THẢ & CHỈNH SỬA (Scale, Rotate, Delete)
            // ==========================================
            
            // Xóa item
            const deleteItem = async (itemId) => {
                if (!isUnlocked) return;
                const updatedItems = currentPage.items.filter(i => i.id !== itemId);
                await db.collection('pages').doc(currentPage.id).update({ items: updatedItems });
                setSelectedItemId(null);
            };

            // Cập nhật thông số (Scale/Rotate)
            const updateItemTransform = async (itemId, type, direction) => {
                if (!isUnlocked) return;
                const items = [...currentPage.items];
                const index = items.findIndex(i => i.id === itemId);
                if (index === -1) return;

                if (type === 'scale') {
                    items[index].scale = Math.max(0.5, items[index].scale + (direction * 0.1));
                } else if (type === 'rotate') {
                    items[index].rotate = (items[index].rotate + (direction * 15)) % 360;
                }
                
                // Lưu cập nhật tạm thời ở local để UI mượt, sau đó đẩy lên mạng
                await db.collection('pages').doc(currentPage.id).update({ items });
            };

            // Kéo thả bằng chuột/cảm ứng
            const handlePointerDown = (e, item) => {
                if (!isUnlocked) return;
                e.stopPropagation();
                setSelectedItemId(item.id);

                const rect = e.target.getBoundingClientRect();
                const notebookRect = notebookRef.current.getBoundingClientRect();
                
                // Tính khoảng cách từ điểm click đến tâm của phần tử
                setDraggingItem({
                    id: item.id,
                    offsetX: e.clientX - rect.left - rect.width/2,
                    offsetY: e.clientY - rect.top - rect.height/2
                });
            };

            const handlePointerMove = (e) => {
                if (!draggingItem || !isUnlocked || !notebookRef.current) return;
                
                const notebookRect = notebookRef.current.getBoundingClientRect();
                
                // Tính % tọa độ X, Y mới
                let newX = ((e.clientX - notebookRect.left - draggingItem.offsetX) / notebookRect.width) * 100;
                let newY = ((e.clientY - notebookRect.top - draggingItem.offsetY) / notebookRect.height) * 100;
                
                // Giới hạn không cho kéo ra ngoài sổ
                newX = Math.max(5, Math.min(95, newX));
                newY = Math.max(5, Math.min(95, newY));

                // Snap vào dòng kẻ ngang (24px/dòng) nếu là Text
                const targetItem = currentPage.items.find(i => i.id === draggingItem.id);
                if (targetItem && targetItem.type === 'text') {
                    // Dòng kẻ đầu tiên bắt đầu khoảng 60px từ trên xuống
                    const yPx = (newY / 100) * notebookRect.height;
                    const snappedYPx = Math.round((yPx - 60) / 24) * 24 + 60;
                    newY = (snappedYPx / notebookRect.height) * 100;
                }

                // Cập nhật State nội bộ để kéo mượt
                const updatedPages = [...pages];
                const pageIdx = updatedPages.findIndex(p => p.id === currentPage.id);
                const itemIdx = updatedPages[pageIdx].items.findIndex(i => i.id === draggingItem.id);
                
                updatedPages[pageIdx].items[itemIdx].x = newX;
                updatedPages[pageIdx].items[itemIdx].y = newY;
                setPages(updatedPages);
            };

            const handlePointerUp = async () => {
                if (!draggingItem || !isUnlocked) return;
                
                // Lấy tọa độ cuối cùng và lưu lên DB
                const finalItem = currentPage.items.find(i => i.id === draggingItem.id);
                if (finalItem) {
                    try {
                        await db.collection('pages').doc(currentPage.id).update({
                            items: currentPage.items
                        });
                    } catch(err) {
                        console.error("Lỗi kéo thả cập nhật lên cloud:", err);
                        if(err.message.includes("permission")) {
                             alert("Lỗi: Quá trình lưu di chuyển bị chặn do Firebase Rules.");
                        }
                    }
                }
                setDraggingItem(null);
            };

            // Hàm chuyển đổi class màu chữ
            const getTextColorClass = (color) => {
                switch(color) {
                    case 'blue': return 'text-sky-800';
                    case 'red': return 'text-rose-600 font-bold';
                    case 'black': return 'text-stone-900';
                    case 'violet': default: return 'text-indigo-700';
                }
            };

            return (
                <div class="min-h-screen flex flex-col font-sans">
                    
                    {/* NAV BAR */}
                    <nav class="bg-rose-950 text-rose-100 px-4 py-3 shadow-lg flex flex-col md:flex-row justify-between items-center gap-4 z-40 sticky top-0 border-b-2 border-rose-800/50">
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">🎒</span>
                            <div>
                                <h1 class="text-xl font-bold font-serif-title text-amber-100 tracking-wider">KỶ NIỆM PHƯỢNG VĨ</h1>
                                <p class="text-[10px] text-rose-300 uppercase tracking-widest">Lưu bút số hóa</p>
                            </div>
                        </div>

                        {/* Pagination */}
                        <div class="flex items-center gap-4 bg-rose-900/60 px-4 py-2 rounded-full border border-rose-700/50">
                            <button onClick={() => turnPage('prev')} disabled={currentPageIdx === 0} class="hover:text-amber-300 disabled:opacity-30 transition">
                                <i class="fa-solid fa-chevron-left fa-lg"></i>
                            </button>
                            <div class="text-sm font-semibold min-w-[120px] text-center text-amber-200">
                                {currentPage ? currentPage.author : 'Đang tải...'}
                                <span class="block text-[10px] text-rose-400 font-normal">
                                    Trang {currentPageIdx + 1} / {pages.length}
                                </span>
                            </div>
                            <button onClick={() => turnPage('next')} disabled={currentPageIdx === pages.length - 1} class="hover:text-amber-300 disabled:opacity-30 transition">
                                <i class="fa-solid fa-chevron-right fa-lg"></i>
                            </button>
                        </div>

                        <div class="flex gap-2">
                            {currentPage && (
                                isUnlocked ? (
                                    <button onClick={() => { setEditUnlocked(prev => ({...prev, [currentPage.id]: false})); setSelectedItemId(null); }} class="bg-emerald-600/20 text-emerald-400 border border-emerald-500/50 text-xs font-bold py-2 px-4 rounded-full flex items-center gap-2 hover:bg-emerald-600/40 transition">
                                        <i class="fa-solid fa-lock-open"></i> Đang Mở Khóa
                                    </button>
                                ) : (
                                    <button onClick={() => setShowUnlockModal(true)} class="bg-stone-800/50 text-stone-300 border border-stone-600 text-xs font-bold py-2 px-4 rounded-full flex items-center gap-2 hover:bg-stone-700 transition">
                                        <i class="fa-solid fa-lock"></i> Mở Khóa Sửa
                                    </button>
                                )
                            )}
                            <button onClick={() => setShowCreateModal(true)} class="bg-gradient-to-r from-amber-600 to-rose-600 text-white text-xs font-bold py-2 px-4 rounded-full shadow-lg hover:scale-105 transition transform">
                                <i class="fa-solid fa-plus"></i> Tạo Trang Mới
                            </button>
                        </div>
                    </nav>

                    <main class="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-12 gap-6 relative"
                          onPointerMove={handlePointerMove}
                          onPointerUp={handlePointerUp}
                          onPointerLeave={handlePointerUp}>
                        
                        {/* 1/3: KHAY DỤNG CỤ THIẾT KẾ */}
                        <section class="md:col-span-4 bg-stone-900/60 p-5 rounded-[2rem] border border-stone-800 shadow-2xl backdrop-blur-md h-fit sticky top-24">
                            <h2 class="text-xl font-bold text-amber-200 border-b border-stone-700 pb-3 mb-4">🎨 Khay Đồ Dùng</h2>
                            
                            <div class={`space-y-5 ${!isUnlocked ? 'opacity-50 pointer-events-none' : ''}`}>
                                {/* Tool 1: Viết chữ */}
                                <div class="bg-stone-800/80 p-4 rounded-2xl border border-stone-700">
                                    <label class="text-xs text-stone-400 font-bold mb-2 block">1. Viết lời chúc (Mực máy)</label>
                                    <form onSubmit={handleAddText} class="flex flex-col gap-2">
                                        <input type="text" value={textInput} onChange={e => setTextInput(e.target.value)} class="w-full bg-stone-950 border border-stone-700 rounded-xl px-3 py-2 text-sm text-stone-200 focus:ring-1 focus:ring-amber-500 outline-none" placeholder="Viết lên trang giấy..." />
                                        <div class="flex justify-between items-center mt-2">
                                            <div class="flex gap-2">
                                                {['violet', 'blue', 'black', 'red'].map(c => (
                                                    <button key={c} type="button" onClick={() => setInkColor(c)} class={`w-5 h-5 rounded-full ${c==='violet'?'bg-indigo-500':c==='blue'?'bg-sky-500':c==='red'?'bg-rose-500':'bg-stone-800'} ${inkColor===c ? 'border-2 border-white scale-110' : 'border border-transparent'}`}></button>
                                                ))}
                                            </div>
                                            <div class="flex gap-1 text-[10px]">
