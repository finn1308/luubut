<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Sổ Lưu Bút Tuổi Học Trò ✨</title>
    
    <!-- Tailwind CSS để dựng giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Thư viện Icon FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Các font chữ viết tay hoài niệm -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Quicksand:wght@400;500;600;700&family=Patrick+Hand&family=Caveat:wght@600;700&display=swap');
        
        body { font-family: 'Quicksand', sans-serif; }
        .font-serif-title { font-family: 'Playfair Display', serif; }
        .font-handwriting { font-family: 'Patrick Hand', cursive; }
        .font-cursive { font-family: 'Caveat', cursive; }

        /* Giao diện Vở Ô Ly 3D */
        .notebook-paper {
            background-color: #faf6eb; 
            background-image: 
                linear-gradient(90deg, transparent 59px, #f43f5e 1px, #f43f5e 1px, transparent 61px),
                linear-gradient(rgba(14, 165, 233, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 100% 24px, 24px 100%;
            background-position: 0 0, 0 16px, 12px 0;
            line-height: 24px;
        }

        /* Hiệu ứng lật trang 3D */
        .page-turn-enter {
            animation: turnPageIn 0.6s cubic-bezier(0.645, 0.045, 0.355, 1) forwards;
            transform-origin: left center;
        }
        @keyframes turnPageIn {
            0% { transform: perspective(1200px) rotateY(90deg); opacity: 0; }
            100% { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
        }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #3b271d; }
        ::-webkit-scrollbar-thumb { background: #8b5a2b; border-radius: 4px; }
    </style>

    <!-- Thư viện React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK Compat (Nạp trực tiếp qua CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#2d1b13] text-stone-800 min-h-screen relative overflow-x-hidden selection:bg-amber-200">

    <!-- Lớp phủ nền mặt bàn gỗ -->
    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#5a3d28_1px,transparent_1px)] [background-size:16px_16px] pointer-events-none"></div>

    <div id="root"></div>

    <!-- CODE CHÍNH ỨNG DỤNG -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. CẤU HÌNH FIREBASE CỦA RIÊNG BẠN
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBsrtuab9iEdGqBOwYOD7o-Lcg3-oeGsJc",
            authDomain: "luubut-2cdca.firebaseapp.com",
            projectId: "luubut-2cdca",
            storageBucket: "luubut-2cdca.firebasestorage.app",
            messagingSenderId: "681786124008",
            appId: "1:681786124008:web:f05056b4a831e4c9204b5d"
        };

        // Khởi tạo Firebase
        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            console.log("✅ Đã kết nối Firebase thành công!");
        } catch (error) {
            console.error("❌ Lỗi kết nối Firebase:", error);
        }

        // ==========================================
        // 2. DỮ LIỆU GỐC & CÔNG CỤ TẠO STICKER
        // ==========================================
        const STICKER_TEMPLATES = {
            phuongvi: { name: "Hoa Phượng", icon: "🌸", content: "https://cdn-icons-png.flaticon.com/512/3209/3209012.png" },
            plane: { name: "Máy Bay Giấy", icon: "✈️", content: "https://cdn-icons-png.flaticon.com/512/2165/2165734.png" },
            heart: { name: "Trái Tim", icon: "💖", content: "https://cdn-icons-png.flaticon.com/512/833/833472.png" },
            daisy: { name: "Cúc Họa Mi", icon: "🌼", content: "https://cdn-icons-png.flaticon.com/512/1087/1087340.png" }
        };

        const formatDate = (timestamp) => {
            if (!timestamp) return 'Mới đây';
            if (typeof timestamp === 'number') return new Date(timestamp).toLocaleDateString('vi-VN');
            if (timestamp.toDate) return new Date(timestamp.toDate()).toLocaleDateString('vi-VN');
            return 'Mới đây';
        };

        function App() {
            const [pages, setPages] = useState([]);
            const [currentPageIdx, setCurrentPageIdx] = useState(0);
            const [pageFlipKey, setPageFlipKey] = useState(0); 
            const [editUnlocked, setEditUnlocked] = useState({}); 
            
            const [textInput, setTextInput] = useState('');
            const [inkColor, setInkColor] = useState('violet');
            const [fontSize, setFontSize] = useState('font-handwriting');
            
            const [selectedItemId, setSelectedItemId] = useState(null);
            const [draggingItem, setDraggingItem] = useState(null);

            const [showCreateModal, setShowCreateModal] = useState(false);
            const [showUnlockModal, setShowUnlockModal] = useState(false);
            const [unlockInput, setUnlockInput] = useState('');
            const [toast, setToast] = useState('');
            
            // Thông báo lỗi rõ ràng nếu Firebase bị chặn
            const [criticalError, setCriticalError] = useState('');

            const notebookRef = useRef(null);
            const fileInputRef = useRef(null);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 4000);
            };

            // Kiểm tra môi trường file:// để cảnh báo
            useEffect(() => {
                if (window.location.protocol === 'file:') {
                    alert("CẢNH BÁO: Bạn đang mở trực tiếp bằng đường dẫn file://. Cơ sở dữ liệu Firebase có thể sẽ từ chối hoạt động. Để sử dụng tốt nhất, hãy đưa lên mạng (Vercel) hoặc mở qua Local Server nhé!");
                }
            }, []);

            // ==========================================
            // LẮNG NGHE DỮ LIỆU REALTIME TỪ FIREBASE
            // ==========================================
            useEffect(() => {
                if (!db) {
                    setCriticalError("Không thể khởi tạo Firebase. Vui lòng kiểm tra lại cấu hình kết nối.");
                    return;
                }
                
                const pagesRef = db.collection('pages');
                
                const unsubscribe = pagesRef.orderBy('createdAt', 'asc').onSnapshot(snapshot => {
                    setCriticalError(''); // Reset lỗi nếu thành công
                    const loadedPages = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    if (loadedPages.length === 0) {
                        // Nếu DB trống, tự động tạo trang bìa đầu tiên (Không pass)
                        pagesRef.add({
                            author: "Tập Thể Lớp Chúng Mình",
                            password: "",
                            items: [],
                            createdAt: Date.now() 
                        }).catch(err => {
                            console.error("Lỗi tạo trang bìa:", err);
                            if (err.message.includes("permission")) {
                                setCriticalError("Bạn chưa đổi tab 'Rules' trong Firebase thành 'true'. Hãy vào Firebase sửa ngay để cuốn sổ hiện ra nhé!");
                            }
                        });
                    } else {
                        setPages(loadedPages);
                        if (currentPageIdx >= loadedPages.length) {
                            setCurrentPageIdx(Math.max(0, loadedPages.length - 1));
                        }
                    }
                }, error => {
                    console.error("Lỗi tải dữ liệu:", error);
                    if (error.message.includes("Missing or insufficient permissions")) {
                        setCriticalError("🔥 LỖI QUYỀN TRUY CẬP: Bạn chưa bật Quyền Đọc/Ghi trên Firebase (Rules). Hãy vào mục Firestore Database -> Rules -> Sửa 'false' thành 'true' và Publish!");
                    } else {
                        setCriticalError("Mất kết nối mạng hoặc sai ID dự án Firebase!");
                    }
                });

                return () => unsubscribe();
            }, [currentPageIdx]);

            const currentPage = pages[currentPageIdx];
            const isUnlocked = currentPage ? editUnlocked[currentPage.id] : false;

            // ==========================================
            // CÁC HÀM XỬ LÝ (TẠO TRANG, THÊM ITEM, KÉO THẢ)
            // ==========================================
            const turnPage = (direction) => {
                if (direction === 'next' && currentPageIdx < pages.length - 1) {
                    setCurrentPageIdx(prev => prev + 1);
                    setPageFlipKey(prev => prev + 1);
                    setSelectedItemId(null);
                } else if (direction === 'prev' && currentPageIdx > 0) {
                    setCurrentPageIdx(prev => prev - 1);
                    setPageFlipKey(prev => prev + 1);
                    setSelectedItemId(null);
                }
            };

            const handleCreatePage = async (e) => {
                e.preventDefault();
                const author = e.target.author.value.trim();
                const pwd = e.target.password.value.trim();
                if (!author || !pwd) return;

                try {
                    const newDoc = await db.collection('pages').add({
                        author: author,
                        password: pwd,
                        items: [],
                        createdAt: Date.now()
                    });
                    
                    setEditUnlocked(prev => ({ ...prev, [newDoc.id]: true }));
                    setShowCreateModal(false);
                    showToast(`Đã lưu trang riêng cho ${author} vĩnh viễn!`);
                    
                    setTimeout(() => {
                        setCurrentPageIdx(pages.length);
                        setPageFlipKey(prev => prev + 1);
                    }, 500);

                } catch (error) {
                    if (error.message.includes("permission")) {
                        setCriticalError("KHÔNG THỂ TẠO TRANG! Bạn chưa cấp quyền Ghi (Rules) trong Firebase.");
                        setShowCreateModal(false);
                    } else {
                        showToast("Lỗi khi tạo trang. Vui lòng thử lại.");
                    }
                }
            };

            const handleUnlock = (e) => {
                e.preventDefault();
                if (!currentPage) return;
                
                if (unlockInput === currentPage.password || currentPage.password === "") {
                    setEditUnlocked(prev => ({ ...prev, [currentPage.id]: true }));
                    setShowUnlockModal(false);
                    setUnlockInput('');
                    showToast("Mở khóa thành công! Bạn có thể viết vẽ rồi.");
                } else {
                    showToast("❌ Sai mật khẩu. Vui lòng hỏi chủ trang!");
                }
            };

            const addItemToPage = async (newItem) => {
                if (!isUnlocked || !currentPage) {
                    showToast("Cần mở khóa trang để dán!");
                    return;
                }
                const updatedItems = [...(currentPage.items || []), newItem];
                try {
                    await db.collection('pages').doc(currentPage.id).update({ items: updatedItems });
                } catch (error) {
                    if (error.message.includes("permission")) {
                        setCriticalError("LỖI CHẶN LƯU DỮ LIỆU! Hãy vào Firebase bật quyền Rules = true.");
                    } else {
                        showToast("Lỗi khi dán lên trang.");
                    }
                }
            };

            const handleAddText = (e) => {
                e.preventDefault();
                if (!textInput.trim()) return;
                addItemToPage({
                    id: 'txt_' + Date.now(),
                    type: 'text',
                    content: textInput,
                    color: inkColor,
                    font: fontSize,
                    x: 20, y: 20,
                    scale: 1, rotate: 0
                });
                setTextInput('');
            };

            const handleAddSticker = (stickerKey) => {
                addItemToPage({
                    id: 'stk_' + Date.now(),
                    type: 'sticker',
                    content: STICKER_TEMPLATES[stickerKey].content,
                    x: 50, y: 50,
                    scale: 1, rotate: (Math.random() * 30) - 15 
                });
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!isUnlocked) {
                    showToast("Vui lòng mở khóa trang trước khi tải ảnh lên!");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const base64Image = canvas.toDataURL('image/jpeg', 0.7);
                        
                        addItemToPage({
                            id: 'img_' + Date.now(),
                            type: 'image',
                            content: base64Image,
                            x: 50, y: 50,
                            scale: 1, rotate: 0
                        });
                        showToast("Đã dán ảnh thành công!");
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };
            
            const deleteItem = async (itemId) => {
                if (!isUnlocked) return;
                const updatedItems = currentPage.items.filter(i => i.id !== itemId);
                await db.collection('pages').doc(currentPage.id).update({ items: updatedItems });
                setSelectedItemId(null);
            };

            const updateItemTransform = async (itemId, type, direction) => {
                if (!isUnlocked) return;
                const items = [...currentPage.items];
                const index = items.findIndex(i => i.id === itemId);
                if (index === -1) return;

                if (type === 'scale') {
                    items[index].scale = Math.max(0.5, items[index].scale + (direction * 0.1));
                } else if (type === 'rotate') {
                    items[index].rotate = (items[index].rotate + (direction * 15)) % 360;
                }
                
                await db.collection('pages').doc(currentPage.id).update({ items });
            };

            const handlePointerDown = (e, item) => {
                if (!isUnlocked) return;
                e.stopPropagation();
                setSelectedItemId(item.id);

                const rect = e.target.getBoundingClientRect();
                setDraggingItem({
                    id: item.id,
                    offsetX: e.clientX - rect.left - rect.width/2,
                    offsetY: e.clientY - rect.top - rect.height/2
                });
            };

            const handlePointerMove = (e) => {
                if (!draggingItem || !isUnlocked || !notebookRef.current) return;
                
                const notebookRect = notebookRef.current.getBoundingClientRect();
                
                let newX = ((e.clientX - notebookRect.left - draggingItem.offsetX) / notebookRect.width) * 100;
                let newY = ((e.clientY - notebookRect.top - draggingItem.offsetY) / notebookRect.height) * 100;
                
                newX = Math.max(5, Math.min(95, newX));
                newY = Math.max(5, Math.min(95, newY));

                const targetItem = currentPage.items.find(i => i.id === draggingItem.id);
                if (targetItem && targetItem.type === 'text') {
                    const yPx = (newY / 100) * notebookRect.height;
                    const snappedYPx = Math.round((yPx - 60) / 24) * 24 + 60;
                    newY = (snappedYPx / notebookRect.height) * 100;
                }

                const updatedPages = [...pages];
                const pageIdx = updatedPages.findIndex(p => p.id === currentPage.id);
                const itemIdx = updatedPages[pageIdx].items.findIndex(i => i.id === draggingItem.id);
                
                updatedPages[pageIdx].items[itemIdx].x = newX;
                updatedPages[pageIdx].items[itemIdx].y = newY;
                setPages(updatedPages);
            };

            const handlePointerUp = async () => {
                if (!draggingItem || !isUnlocked) return;
                
                const finalItem = currentPage.items.find(i => i.id === draggingItem.id);
                if (finalItem) {
                    try {
                        await db.collection('pages').doc(currentPage.id).update({
                            items: currentPage.items
                        });
                    } catch(err) {
                        console.error("Lỗi cập nhật tọa độ:", err);
                    }
                }
                setDraggingItem(null);
            };

            const getTextColorClass = (color) => {
                switch(color) {
                    case 'blue': return 'text-sky-800';
                    case 'red': return 'text-rose-600 font-bold';
                    case 'black': return 'text-stone-900';
                    case 'violet': default: return 'text-indigo-700';
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    
                    {/* BẢNG LỖI CẢNH BÁO QUAN TRỌNG NẾU FIREBASE BỊ CHẶN */}
                    {criticalError && (
                        <div className="fixed top-16 left-1/2 -translate-x-1/2 w-[90%] max-w-lg bg-rose-600 text-white px-6 py-4 rounded-2xl shadow-2xl z-[100] font-bold text-center animate-bounce border-4 border-rose-800">
                            <i className="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
                            <p>{criticalError}</p>
                            <div className="mt-3 bg-white text-rose-800 text-xs p-3 rounded-xl text-left">
                                <p className="font-bold mb-1">CÁCH KHẮC PHỤC TRONG 30 GIÂY:</p>
                                <ol className="list-decimal list-inside font-normal space-y-1">
                                    <li>Mở tab Firebase Console nơi bạn vừa tạo Data.</li>
                                    <li>Vào <b>Firestore Database</b> &gt; Bấm tab <b>Rules (Quy tắc)</b>.</li>
                                    <li>Đổi chữ <b>false</b> thành <b>true</b>. Bấm <b>Publish</b>.</li>
                                    <li>Quay lại đây và <b>F5 tải lại trang</b>.</li>
                                </ol>
                            </div>
                        </div>
                    )}

                    {/* NAV BAR */}
                    <nav className="bg-rose-950 text-rose-100 px-4 py-3 shadow-lg flex flex-col md:flex-row justify-between items-center gap-4 z-40 sticky top-0 border-b-2 border-rose-800/50">
                        <div className="flex items-center gap-3">
                            <span className="text-3xl">🎒</span>
                            <div>
                                <h1 className="text-xl font-bold font-serif-title text-amber-100 tracking-wider">KỶ NIỆM PHƯỢNG VĨ</h1>
                                <p className="text-[10px] text-rose-300 uppercase tracking-widest">Lưu bút số hóa</p>
                            </div>
                        </div>

                        {/* Pagination */}
                        <div className="flex items-center gap-4 bg-rose-900/60 px-4 py-2 rounded-full border border-rose-700/50">
                            <button onClick={() => turnPage('prev')} disabled={currentPageIdx === 0 || !currentPage} className="hover:text-amber-300 disabled:opacity-30 transition">
                                <i className="fa-solid fa-chevron-left fa-lg"></i>
                            </button>
                            <div className="text-sm font-semibold min-w-[120px] text-center text-amber-200">
                                {currentPage ? currentPage.author : 'Đang tải...'}
                                <span className="block text-[10px] text-rose-400 font-normal">
                                    Trang {pages.length > 0 ? currentPageIdx + 1 : 0} / {pages.length}
                                </span>
                            </div>
                            <button onClick={() => turnPage('next')} disabled={currentPageIdx === pages.length - 1 || !currentPage} className="hover:text-amber-300 disabled:opacity-30 transition">
                                <i className="fa-solid fa-chevron-right fa-lg"></i>
                            </button>
                        </div>

                        <div className="flex gap-2">
                            {currentPage && (
                                isUnlocked ? (
                                    <button onClick={() => { setEditUnlocked(prev => ({...prev, [currentPage.id]: false})); setSelectedItemId(null); }} className="bg-emerald-600/20 text-emerald-400 border border-emerald-500/50 text-xs font-bold py-2 px-4 rounded-full flex items-center gap-2 hover:bg-emerald-600/40 transition">
                                        <i className="fa-solid fa-lock-open"></i> Đang Mở Khóa
                                    </button>
                                ) : (
                                    <button onClick={() => setShowUnlockModal(true)} className="bg-stone-800/50 text-stone-300 border border-stone-600 text-xs font-bold py-2 px-4 rounded-full flex items-center gap-2 hover:bg-stone-700 transition">
                                        <i className="fa-solid fa-lock"></i> Mở Khóa Sửa
                                    </button>
                                )
                            )}
                            <button onClick={() => setShowCreateModal(true)} className="bg-gradient-to-r from-amber-600 to-rose-600 text-white text-xs font-bold py-2 px-4 rounded-full shadow-lg hover:scale-105 transition transform">
                                <i className="fa-solid fa-plus"></i> Tạo Trang Mới
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-12 gap-6 relative"
                          onPointerMove={handlePointerMove}
                          onPointerUp={handlePointerUp}
                          onPointerLeave={handlePointerUp}>
                        
                        {/* 1/3: KHAY DỤNG CỤ THIẾT KẾ */}
                        <section className="md:col-span-4 bg-stone-900/60 p-5 rounded-[2rem] border border-stone-800 shadow-2xl backdrop-blur-md h-fit sticky top-24">
                            <h2 className="text-xl font-bold text-amber-200 border-b border-stone-700 pb-3 mb-4">🎨 Khay Đồ Dùng</h2>
                            
                            <div className={`space-y-5 ${!isUnlocked ? 'opacity-50 pointer-events-none' : ''}`}>
                                {/* Tool 1: Viết chữ */}
                                <div className="bg-stone-800/80 p-4 rounded-2xl border border-stone-700">
                                    <label className="text-xs text-stone-400 font-bold mb-2 block">1. Viết lời chúc (Mực máy)</label>
                                    <form onSubmit={handleAddText} className="flex flex-col gap-2">
                                        <input type="text" value={textInput} onChange={e => setTextInput(e.target.value)} className="w-full bg-stone-950 border border-stone-700 rounded-xl px-3 py-2 text-sm text-stone-200 focus:ring-1 focus:ring-amber-500 outline-none" placeholder="Viết lên trang giấy..." />
                                        <div className="flex justify-between items-center mt-2">
                                            <div className="flex gap-2">
                                                {['violet', 'blue', 'black', 'red'].map(c => (
                                                    <button key={c} type="button" onClick={() => setInkColor(c)} className={`w-5 h-5 rounded-full ${c==='violet'?'bg-indigo-500':c==='blue'?'bg-sky-500':c==='red'?'bg-rose-500':'bg-stone-800'} ${inkColor===c ? 'border-2 border-white scale-110' : 'border border-transparent'}`}></button>
                                                ))}
                                            </div>
                                            <div className="flex gap-1 text-[10px]">
                                                <button type="button" onClick={() => setFontSize('font-handwriting')} className={`px-2 py-1 rounded ${fontSize==='font-handwriting'?'bg-stone-700 text-white':'text-stone-400'}`}>Bút Bi</button>
                                                <button type="button" onClick={() => setFontSize('font-cursive')} className={`px-2 py-1 rounded ${fontSize==='font-cursive'?'bg-stone-700 text-white':'text-stone-400'}`}>Lá Tre</button>
                                            </div>
                                        </div>
                                        <button type="submit" className="mt-2 bg-stone-700 hover:bg-stone-600 text-white text-xs py-2 rounded-lg font-bold">Dán Chữ Lên Vở</button>
                                    </form>
                                </div>

                                {/* Tool 2: Nhãn dán */}
                                <div className="bg-stone-800/80 p-4 rounded-2xl border border-stone-700">
                                    <label className="text-xs text-stone-400 font-bold mb-2 block">2. Dán Sticker</label>
                                    <div className="grid grid-cols-4 gap-2">
                                        {Object.keys(STICKER_TEMPLATES).map(key => (
                                            <button key={key} onClick={() => handleAddSticker(key)} className="bg-stone-900 hover:bg-amber-900/50 border border-stone-700 p-2 rounded-xl flex flex-col items-center justify-center gap-1 transition">
                                                <img src={STICKER_TEMPLATES[key].content} className="w-8 h-8 object-contain drop-shadow-md opacity-90" />
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Tool 3: Upload Ảnh */}
                                <div className="bg-stone-800/80 p-4 rounded-2xl border border-stone-700">
                                    <label className="text-xs text-stone-400 font-bold mb-2 block">3. Kẹp Ảnh Kỷ Niệm</label>
                                    <input type="file" accept="image/*" ref={fileInputRef} onChange={handleImageUpload} className="hidden" />
                                    <button onClick={() => fileInputRef.current.click()} className="w-full bg-stone-900 hover:bg-stone-700 text-amber-200 border border-stone-600 border-dashed text-xs py-4 rounded-xl flex items-center justify-center gap-2 transition">
                                        <i className="fa-solid fa-camera"></i> Tải ảnh từ máy lên
                                    </button>
                                    <p className="text-[9px] text-stone-500 mt-2 text-center">*Hỗ trợ ảnh tự động thu nhỏ để dán lên vở.</p>
                                </div>
                            </div>

                            {!isUnlocked && currentPage && (
                                <div className="mt-4 p-3 bg-rose-900/20 border border-rose-900/50 rounded-xl text-xs text-rose-300 text-center">
                                    <i className="fa-solid fa-lock"></i> Hãy nhập mật mã ở thanh phía trên để mở khóa sửa đổi nhé.
                                </div>
                            )}
                        </section>

                        {/* 2/3: CUỐN SỔ LƯU BÚT 3D */}
                        <section className="md:col-span-8 perspective-1000">
                            <div className="bg-[#4a3525] p-3 md:p-5 rounded-[2rem] shadow-2xl border-[6px] border-[#2d1b13] relative overflow-hidden h-full min-h-[700px] flex">
                                
                                <div className="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-stone-950 via-stone-800 to-transparent z-20 border-r border-black/30"></div>
                                
                                <div className="w-full h-full relative pl-6">
                                    {/* Thay vì ẩn đi khi currentPage bị undefined, ta Render Bìa Chờ hoặc Sổ */}
                                    <div 
                                        key={pageFlipKey} 
                                        ref={notebookRef}
                                        className="notebook-paper w-full h-full min-h-[660px] rounded-r-2xl shadow-inner relative overflow-hidden page-turn-enter"
                                        onClick={() => setSelectedItemId(null)}
                                    >
                                        {!currentPage ? (
                                            // Giao diện khi trống/Đang tải dữ liệu
                                            <div className="absolute inset-0 flex flex-col items-center justify-center opacity-70 px-4 text-center">
                                                <i className="fa-solid fa-hourglass-half fa-spin text-5xl mb-4 text-amber-800"></i>
                                                <p className="font-handwriting text-3xl text-stone-700 mb-2">Đang kết nối đến lớp học...</p>
                                                <p className="text-sm font-sans text-stone-500 max-w-sm">
                                                    Nếu đợi quá lâu, vui lòng kiểm tra lại <b>Rules Firebase</b> của bạn đã được bật <b>true</b> chưa nhé!
                                                </p>
                                            </div>
                                        ) : (
                                            // Giao diện khi có trang
                                            <>
                                                <div className="absolute top-4 left-12 right-6 border-b border-dashed border-stone-400 pb-2">
                                                    <span className="text-xs text-stone-500 font-bold uppercase">Người viết: </span>
                                                    <span className="text-xl font-bold font-serif-title text-amber-900 ml-2">{currentPage.author}</span>
                                                    <span className="float-right text-[10px] text-stone-400 mt-2">
                                                        {formatDate(currentPage.createdAt)}
                                                    </span>
                                                </div>

                                                {currentPage.items?.map((item) => {
                                                    const isSelected = selectedItemId === item.id;
                                                    return (
                                                        <div 
                                                            key={item.id}
                                                            onPointerDown={(e) => handlePointerDown(e, item)}
                                                            className={`absolute cursor-${isUnlocked ? 'grab' : 'default'} ${draggingItem?.id === item.id ? 'cursor-grabbing opacity-80 scale-105' : ''} transition-transform duration-100 touch-none`}
                                                            style={{
                                                                left: `${item.x}%`,
                                                                top: `${item.y}%`,
                                                                transform: `translate(-50%, -50%) scale(${item.scale}) rotate(${item.rotate}deg)`,
                                                                zIndex: isSelected ? 30 : 10
                                                            }}
                                                        >
                                                            {isSelected && isUnlocked && (
                                                                <div className="absolute -top-12 left-1/2 -translate-x-1/2 bg-stone-900/90 text-white rounded-lg shadow-xl flex gap-1 p-1 text-xs border border-stone-600 animate-fade-in pointer-events-auto">
                                                                    <button onClick={() => updateItemTransform(item.id, 'scale', 1)} className="p-1.5 hover:bg-stone-700 rounded"><i className="fa-solid fa-magnifying-glass-plus"></i></button>
                                                                    <button onClick={() => updateItemTransform(item.id, 'scale', -1)} className="p-1.5 hover:bg-stone-700 rounded"><i className="fa-solid fa-magnifying-glass-minus"></i></button>
                                                                    <div className="w-[1px] bg-stone-600 mx-1"></div>
                                                                    <button onClick={() => updateItemTransform(item.id, 'rotate', -1)} className="p-1.5 hover:bg-stone-700 rounded"><i className="fa-solid fa-rotate-left"></i></button>
                                                                    <button onClick={() => updateItemTransform(item.id, 'rotate', 1)} className="p-1.5 hover:bg-stone-700 rounded"><i className="fa-solid fa-rotate-right"></i></button>
                                                                    <div className="w-[1px] bg-stone-600 mx-1"></div>
                                                                    <button onClick={() => deleteItem(item.id)} className="p-1.5 text-rose-400 hover:bg-rose-900/50 rounded"><i className="fa-solid fa-trash-can"></i></button>
                                                                </div>
                                                            )}

                                                            {item.type === 'text' && (
                                                                <div className={`whitespace-nowrap text-xl font-semibold select-none ${getTextColorClass(item.color)} ${item.font}`}>
                                                                    {item.content}
                                                                </div>
                                                            )}
                                                            {item.type === 'sticker' && (
                                                                <img src={item.content} className="w-16 h-16 object-contain select-none pointer-events-none drop-shadow-sm" draggable="false" />
                                                            )}
                                                            {item.type === 'image' && (
                                                                <div className="p-2 bg-white shadow-md border border-stone-200 rotate-1 select-none pointer-events-none max-w-[200px]">
                                                                    <img src={item.content} className="w-full h-auto" draggable="false" />
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                                
                                                {currentPage.items?.length === 0 && (
                                                    <div className="absolute inset-0 flex flex-col items-center justify-center opacity-30 pointer-events-none">
                                                        <i className="fa-solid fa-pen-nib text-5xl mb-4 text-stone-500"></i>
                                                        <p className="font-handwriting text-2xl text-stone-600">Trang giấy trắng tinh...</p>
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* TOAST THÔNG BÁO */}
                    {toast && (
                        <div className="fixed bottom-5 right-5 bg-stone-900 text-amber-200 px-5 py-3 rounded-xl shadow-2xl border border-amber-500/50 z-50 flex items-center gap-3 animate-bounce">
                            <i className="fa-solid fa-bell text-amber-500"></i>
                            <span className="text-sm font-bold">{toast}</span>
                        </div>
                    )}

                    {/* MODAL 1: TẠO TRANG */}
                    {showCreateModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex justify-center items-center p-4">
                            <form onSubmit={handleCreatePage} className="bg-stone-900 border border-stone-700 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                                <h3 className="text-lg font-bold text-amber-100 border-b border-stone-800 pb-3 mb-4">📖 Tạo Trang Sách Của Bạn</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs text-stone-400 mb-1">Tên hiển thị của bạn:</label>
                                        <input name="author" required type="text" className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-2 text-stone-200 outline-none focus:ring-1 focus:ring-amber-500" placeholder="VD: Huy Nè" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-stone-400 mb-1">Mật khẩu khóa trang này:</label>
                                        <input name="password" required type="text" className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-2 text-stone-200 outline-none focus:ring-1 focus:ring-amber-500 font-mono" placeholder="VD: 12345" />
                                        <p className="text-[10px] text-rose-400 mt-1">*Hãy nhớ pass này để tự sửa trang sau này!</p>
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setShowCreateModal(false)} className="flex-1 bg-stone-800 text-white py-2 rounded-xl text-sm font-bold">Hủy</button>
                                        <button type="submit" className="flex-1 bg-amber-600 text-stone-950 py-2 rounded-xl text-sm font-bold">Thêm Trang Sổ</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* MODAL 2: MỞ KHÓA TRANG */}
                    {showUnlockModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex justify-center items-center p-4">
                            <form onSubmit={handleUnlock} className="bg-stone-900 border border-stone-700 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                                <h3 className="text-lg font-bold text-amber-100 border-b border-stone-800 pb-3 mb-4">🔑 Mở Khóa Chỉnh Sửa</h3>
                                <p className="text-xs text-stone-400 mb-4">Nhập mật mã để chỉnh sửa trang của <span className="font-bold text-amber-400">{currentPage?.author}</span>:</p>
                                <input value={unlockInput} onChange={e => setUnlockInput(e.target.value)} type="password" className="w-full bg-stone-950 border border-stone-700 rounded-xl px-4 py-3 text-stone-200 outline-none focus:ring-1 focus:ring-amber-500 font-mono text-center tracking-widest text-lg mb-4" placeholder="••••" />
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setShowUnlockModal(false)} className="flex-1 bg-stone-800 text-white py-2 rounded-xl text-sm font-bold">Đóng</button>
                                    <button type="submit" className="flex-1 bg-emerald-600 text-white py-2 rounded-xl text-sm font-bold">Mở Khóa Nào!</button>
                                </div>
                            </form>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
